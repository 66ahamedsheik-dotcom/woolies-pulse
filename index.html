<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SST Windows – Attendance Dashboard | PLMS Support Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1220;
      --surface2: #121928;
      --surface3: #1a2438;
      --border: #1e2d44;
      --border2: #243550;
      --accent: #4f8ef7;
      --accent2: #7eb3ff;
      --accent-glow: rgba(79,142,247,0.18);
      --accent-dim: rgba(79,142,247,0.08);
      --green: #10d9a0;
      --green2: #0ef5b4;
      --green-glow: rgba(16,217,160,0.18);
      --red: #f05252;
      --red2: #ff7b7b;
      --yellow: #f5b014;
      --yellow2: #ffd166;
      --purple: #a78bfa;
      --orange: #fb923c;
      --teal: #22d3ee;
      --text: #e4ecf8;
      --text2: #7b92b0;
      --text3: #3d5270;
      --radius: 14px;
      --radius-sm: 9px;
      --radius-xs: 6px;
      --shadow: 0 4px 28px rgba(0,0,0,0.45);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
      --font-head: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: -10%;
      width: 70%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(79,142,247,0.06) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    #root { min-height: 100vh; position: relative; z-index: 1; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:none; } }
    @keyframes slideIn { from { opacity:0; transform:translateX(-14px); } to { opacity:1; transform:none; } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes checkPop { 0%{transform:scale(0) rotate(-15deg);} 55%{transform:scale(1.3) rotate(4deg);} 80%{transform:scale(0.9);} 100%{transform:scale(1);} }
    @keyframes shimmerSlide { 0%{left:-100%} 100%{left:200%} }
    @keyframes glowPulse { 0%,100%{box-shadow:0 0 0 0 transparent} 50%{box-shadow:0 0 20px 4px var(--accent-glow)} }

    .fade-in { animation: fadeIn 0.38s cubic-bezier(.16,1,.3,1) both; }
    .slide-in { animation: slideIn 0.3s cubic-bezier(.16,1,.3,1) both; }

    .loader-wrap {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; flex-direction:column; gap:20px;
    }
    .spinner {
      width:38px; height:38px; border:2.5px solid var(--border2);
      border-top-color:var(--accent); border-radius:50%;
      animation: spin 0.8s linear infinite;
    }

    .auth-wrap {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(79,142,247,0.1) 0%, transparent 70%), var(--bg);
      padding:16px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 22px;
      padding: 44px 40px;
      width: 100%; max-width: 420px;
      box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: fadeIn 0.4s ease;
      position: relative; overflow: hidden;
    }
    .auth-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(79,142,247,0.5), transparent);
    }
    .auth-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
    .auth-logo-icon {
      width:46px; height:46px; background: linear-gradient(135deg,#4f8ef7,#2563eb);
      border-radius:12px; display:flex; align-items:center; justify-content:center;
      font-size:22px; box-shadow: 0 6px 20px rgba(79,142,247,0.4);
    }
    .auth-logo-text { font-family:var(--font-head); font-size:18px; font-weight:800; letter-spacing:-0.3px; }
    .auth-logo-sub { font-size:10px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; font-weight:700; }
    .auth-title { font-family:var(--font-head); font-size:28px; font-weight:800; margin-bottom:6px; letter-spacing:-0.5px; }
    .auth-sub { color:var(--text2); margin-bottom:28px; font-size:13px; line-height:1.6; }
    .form-group { margin-bottom:18px; }
    .form-label { display:block; font-size:11px; font-weight:700; color:var(--text3); margin-bottom:7px; letter-spacing:0.8px; text-transform:uppercase; }
    .form-input {
      width:100%; background:var(--surface2); border:1px solid var(--border2);
      color:var(--text); border-radius:var(--radius-sm); padding:12px 14px;
      font-family:var(--font-body); font-size:14px; outline:none; transition:all 0.2s;
    }
    .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); background:rgba(79,142,247,0.05); }
    .form-input::placeholder { color:var(--text3); }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      border:none; cursor:pointer; font-family:var(--font-body); font-weight:700;
      border-radius:var(--radius-sm); transition:all 0.2s; text-decoration:none;
      letter-spacing:0.01em;
    }
    .btn:disabled { opacity:0.45; cursor:not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg,#4f8ef7,#2563eb);
      color:#fff; padding:13px 24px; font-size:14px; width:100%;
      box-shadow:0 4px 20px rgba(79,142,247,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 28px rgba(79,142,247,0.45); }
    .btn-primary:active:not(:disabled) { transform:translateY(0); }
    .btn-secondary { background:var(--surface2); color:var(--text); padding:9px 18px; font-size:13px; border:1px solid var(--border2); }
    .btn-secondary:hover:not(:disabled) { background:var(--surface3); border-color:var(--accent); }
    .btn-danger { background:rgba(240,82,82,0.1); color:var(--red2); padding:7px 14px; font-size:12px; border:1px solid rgba(240,82,82,0.25); }
    .btn-danger:hover:not(:disabled) { background:rgba(240,82,82,0.2); }
    .btn-sm { padding:7px 14px; font-size:12px; }
    .btn-ghost { background:transparent; color:var(--text2); padding:8px 14px; font-size:13px; border:1px solid transparent; }
    .btn-ghost:hover { background:var(--surface2); color:var(--text); border-color:var(--border2); }
    .error-msg { background:rgba(240,82,82,0.08); border:1px solid rgba(240,82,82,0.25); color:#fca5a5; padding:11px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:16px; }
    .success-msg { background:rgba(16,217,160,0.08); border:1px solid rgba(16,217,160,0.25); color:#5ef5d4; padding:11px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:16px; }

    .app-shell { display:flex; min-height:100vh; }
    .sidebar {
      width:248px; min-height:100vh; background:var(--surface);
      border-right:1px solid var(--border); display:flex; flex-direction:column;
      position:fixed; top:0; left:0; z-index:100;
      transition:transform 0.3s cubic-bezier(.4,0,.2,1);
      box-shadow: 4px 0 32px rgba(0,0,0,0.3);
    }
    .sidebar-logo {
      padding:20px 20px 16px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:11px;
    }
    .sidebar-logo-icon {
      width:38px; height:38px; background:linear-gradient(135deg,#4f8ef7,#2563eb);
      border-radius:10px; display:flex; align-items:center; justify-content:center;
      font-size:19px; flex-shrink:0; box-shadow:0 4px 14px rgba(79,142,247,0.4);
    }
    .sidebar-logo-name { font-family:var(--font-head); font-size:15px; font-weight:800; line-height:1.2; letter-spacing:-0.3px; }
    .sidebar-logo-sub { font-size:9px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; font-weight:700; }
    .sidebar-user { padding:14px 16px; border-bottom:1px solid var(--border); }
    .sidebar-user-inner {
      background:var(--surface2); border:1px solid var(--border2);
      border-radius:var(--radius-sm); padding:12px 13px;
    }
    .sidebar-user-name { font-weight:800; font-size:13px; letter-spacing:-0.2px; }
    .sidebar-user-role { font-size:11px; color:var(--text2); margin-top:2px; }
    .sidebar-user-badge {
      display:inline-block; background:rgba(79,142,247,0.12); color:var(--accent2);
      font-size:10px; font-weight:700; padding:2px 9px; border-radius:99px;
      border:1px solid rgba(79,142,247,0.22); margin-top:6px; letter-spacing:0.5px;
    }
    .sidebar-nav { flex:1; padding:12px 10px; overflow-y:auto; }
    .nav-section-label { font-size:9px; font-weight:800; color:var(--text3); letter-spacing:1.2px; text-transform:uppercase; padding:10px 10px 5px; }
    .nav-item {
      display:flex; align-items:center; gap:10px; padding:10px 11px;
      border-radius:var(--radius-sm); cursor:pointer; font-size:13px; font-weight:600;
      color:var(--text2); transition:all 0.18s; margin-bottom:2px; border:1px solid transparent;
    }
    .nav-item:hover { background:var(--surface2); color:var(--text); }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(79,142,247,0.14), rgba(79,142,247,0.06));
      color:var(--accent2); border-color:rgba(79,142,247,0.2);
    }
    .nav-item .nav-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
    .sidebar-footer { padding:14px 16px; border-top:1px solid var(--border); }
    .main-content { margin-left:248px; flex:1; min-height:100vh; }
    .topbar {
      background:rgba(13,18,32,0.88);
      border-bottom:1px solid var(--border);
      padding:14px 28px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:50; backdrop-filter:blur(20px);
    }
    .topbar-title { font-family:var(--font-head); font-size:18px; font-weight:800; letter-spacing:-0.4px; }
    .topbar-right { display:flex; align-items:center; gap:12px; }
    .page-content { padding:28px; max-width:1440px; }

    .card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:22px; box-shadow:var(--shadow);
      position:relative; overflow:hidden;
    }
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg, transparent 10%, rgba(255,255,255,0.06) 50%, transparent 90%);
    }
    .card-title { font-family:var(--font-head); font-size:15px; font-weight:800; margin-bottom:16px; display:flex; align-items:center; gap:8px; letter-spacing:-0.2px; }
    .grid { display:grid; gap:18px; }
    .grid-2 { grid-template-columns: repeat(2,1fr); }
    .grid-3 { grid-template-columns: repeat(3,1fr); }
    .grid-4 { grid-template-columns: repeat(4,1fr); }
    .grid-auto { grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); }

    .stat-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:20px 22px;
      position:relative; overflow:hidden; transition:all 0.25s cubic-bezier(.16,1,.3,1);
    }
    .stat-card:hover { transform:translateY(-3px); box-shadow:0 16px 40px rgba(0,0,0,0.4); }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
    .stat-card.blue::before { background:linear-gradient(90deg,#4f8ef7,#7eb3ff); }
    .stat-card.green::before { background:linear-gradient(90deg,#10d9a0,#0ef5b4); }
    .stat-card.red::before { background:linear-gradient(90deg,#f05252,#ff7b7b); }
    .stat-card.yellow::before { background:linear-gradient(90deg,#f5b014,#ffd166); }
    .stat-card.purple::before { background:linear-gradient(90deg,#a78bfa,#c4b5fd); }
    .stat-label { font-size:10px; font-weight:800; color:var(--text2); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:8px; }
    .stat-value { font-family:var(--font-head); font-size:36px; font-weight:800; line-height:1; letter-spacing:-1.5px; }
    .stat-sub { font-size:12px; color:var(--text2); margin-top:6px; font-weight:500; }
    .stat-icon { position:absolute; top:18px; right:18px; font-size:24px; opacity:0.2; }

    .att-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .att-btn {
      padding:18px 14px; border-radius:var(--radius); border:1.5px solid var(--border2);
      background:var(--surface2); cursor:pointer; text-align:center;
      transition:all 0.22s cubic-bezier(.16,1,.3,1); font-family:var(--font-body);
      position:relative; overflow:hidden;
    }
    .att-btn:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
    .att-btn.selected.green-sel { border-color:var(--green); background:rgba(16,217,160,0.1); box-shadow:0 0 0 1px var(--green), 0 6px 20px var(--green-glow); }
    .att-btn.selected.yellow-sel { border-color:var(--yellow); background:rgba(245,176,20,0.1); box-shadow:0 0 0 1px var(--yellow); }
    .att-btn.selected.red-sel { border-color:var(--red); background:rgba(240,82,82,0.1); box-shadow:0 0 0 1px var(--red); }
    .att-btn-icon { font-size:26px; margin-bottom:8px; display:block; }
    .att-btn-label { font-size:13px; font-weight:800; color:var(--text); letter-spacing:-0.2px; }
    .att-btn-sub { font-size:11px; color:var(--text2); margin-top:3px; font-weight:500; }

    /* ── SHIFT MODAL ── */
    .shift-modal-backdrop {
      position:fixed; inset:0; background:rgba(0,0,0,0.78); z-index:300;
      display:flex; align-items:center; justify-content:center; padding:16px;
      backdrop-filter:blur(10px);
      animation:fadeIn 0.2s ease;
    }
    .shift-modal {
      background:var(--surface);
      border:1px solid var(--border2);
      border-radius:22px; padding:30px; width:100%; max-width:500px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
      animation:slideUp 0.32s cubic-bezier(.16,1,.3,1);
      position:relative; overflow:hidden;
    }
    .shift-modal::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg, transparent, rgba(79,142,247,0.6), transparent);
    }
    .shift-modal-title { font-family:var(--font-head); font-size:21px; font-weight:800; letter-spacing:-0.4px; margin-bottom:5px; }
    .shift-modal-sub { font-size:13px; color:var(--text2); margin-bottom:22px; font-weight:500; line-height:1.5; }
    .shift-cards-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
    .shift-card {
      padding:16px 14px; border-radius:var(--radius); border:1.5px solid var(--border2);
      background:var(--surface2); cursor:pointer;
      transition:all 0.22s cubic-bezier(.16,1,.3,1);
      position:relative; overflow:hidden; text-align:left;
    }
    .shift-card:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.3); }
    .shift-card.picked { transform:scale(1.02); }
    .shift-card-check {
      position:absolute; top:9px; right:9px;
      width:20px; height:20px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:700;
      animation:checkPop 0.32s cubic-bezier(.16,1,.3,1);
    }
    .shift-card-icon { font-size:24px; margin-bottom:8px; display:block; }
    .shift-card-name { font-size:13px; font-weight:800; margin-bottom:4px; letter-spacing:-0.2px; }
    .shift-card-time { font-size:11px; font-family:var(--font-mono); font-weight:600; letter-spacing:0.3px; }
    .shift-card-desc { font-size:11px; color:var(--text2); margin-top:4px; font-weight:500; }
    .shift-modal-actions { display:flex; gap:10px; }

    .shift-selected-banner {
      display:flex; align-items:center; gap:12px; padding:13px 15px;
      border-radius:var(--radius-sm); margin-bottom:14px;
      animation:fadeIn 0.25s ease;
    }
    .shift-selected-icon { font-size:24px; flex-shrink:0; }
    .shift-selected-info { flex:1; }
    .shift-selected-name { font-size:13px; font-weight:800; letter-spacing:-0.2px; }
    .shift-selected-time { font-size:11px; font-family:var(--font-mono); font-weight:600; margin-top:2px; letter-spacing:0.3px; }

    .shift-dist-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; }
    .shift-dist-header { font-family:var(--font-head); font-size:15px; font-weight:800; margin-bottom:16px; display:flex; align-items:center; gap:8px; letter-spacing:-0.2px; }
    .shift-summary-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:18px; }
    .shift-sum-item {
      background:var(--surface2); border:1px solid var(--border2);
      border-radius:var(--radius-sm); padding:13px 14px;
      position:relative; overflow:hidden;
      transition:all 0.2s;
    }
    .shift-sum-item:hover { border-color:var(--border); transform:translateY(-1px); }
    .shift-sum-item::before { content:''; position:absolute; top:0; left:0; bottom:0; width:3px; border-radius:0 2px 2px 0; }
    .shift-sum-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px; }
    .shift-sum-time { font-size:10px; font-family:var(--font-mono); font-weight:600; color:var(--text2); margin-bottom:8px; letter-spacing:0.3px; }
    .shift-sum-count { font-family:var(--font-head); font-size:26px; font-weight:800; line-height:1; letter-spacing:-1px; }
    .shift-sum-names { margin-top:6px; display:flex; flex-wrap:wrap; gap:4px; }
    .shift-name-chip {
      font-size:10px; font-weight:700; padding:2px 7px; border-radius:99px;
      background:rgba(255,255,255,0.05); color:var(--text2);
      border:1px solid var(--border2);
      display:flex; align-items:center; gap:4px;
    }
    .shift-name-chip .chip-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }

    .checklist-section { margin-top:14px; }
    .checklist-label { font-size:11px; font-weight:800; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
    .checklist-label .label-count { margin-left:auto; font-size:11px; font-weight:700; }
    .check-item {
      display:flex; align-items:center; gap:12px; padding:13px 14px;
      background:var(--surface2); border:1.5px solid var(--border2);
      border-radius:var(--radius-sm); cursor:pointer;
      transition:all 0.22s cubic-bezier(.16,1,.3,1); margin-bottom:8px;
      user-select:none; position:relative; overflow:hidden;
    }
    .check-item:hover { border-color:var(--border); background:var(--surface3); }
    .check-item.checked { background:rgba(16,217,160,0.07); border-color:rgba(16,217,160,0.3); }
    .check-item.checked::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--green); border-radius:0 2px 2px 0; }
    .check-box {
      width:22px; height:22px; border-radius:7px; border:2px solid var(--border2);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition:all 0.22s cubic-bezier(.16,1,.3,1); background:var(--surface3);
    }
    .check-item.checked .check-box {
      background:var(--green); border-color:var(--green);
      box-shadow:0 0 10px var(--green-glow);
      animation:checkPop 0.3s cubic-bezier(.16,1,.3,1);
    }

function Toast({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <span>{t.type === 'success' ? '✅' : '❌'}</span>
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='success') => {
    const id = Date.now();
    setToasts(p => [...p, {id, msg, type}]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);
  return { toasts, add };
}

/* ═══════════ SHIFT MODAL — now accepts a context label ═══════════ */
function ShiftModal({ onConfirm, onClose, contextLabel }) {

        <div className="shift-modal-sub">
          {contextLabel

            : "Choose the shift you're working today — this helps the team track coverage accurately."

            const picked = sel === sh.id;
            return (
              <div
                key={sh.id}
                className={`shift-card ${picked ? 'picked' : ''}`}

function TCSChecklist({ userId, today, toast }) {
  const storKey = `tcs_${userId}_${today}`;
  const [checked, setChecked] = useState(() => {
    try { return JSON.parse(localStorage.getItem(storKey) || '{}'); } catch { return {}; }
  });
  const toggle = id => {
    const next = { ...checked, [id]: !checked[id] };
    setChecked(next);
    try { localStorage.setItem(storKey, JSON.stringify(next)); } catch {}
    if (!checked[id]) {
      const item = TCS_CHECKS.find(i => i.id === id);
      toast(`✅ ${item?.label} marked done!`);
    }
  };
  const doneCount = TCS_CHECKS.filter(i => checked[i.id]).length;
  const pct = Math.round(doneCount / TCS_CHECKS.length * 100);

  return (
    <div className="checklist-section">
      <div className="checklist-label">
        <span>📋 TCS &amp; CATS Compliance</span>
        <span className="label-count" style={{color: doneCount===TCS_CHECKS.length ? 'var(--green)' : 'var(--text3)'}}>
          {doneCount}/{TCS_CHECKS.length} {doneCount===TCS_CHECKS.length && '🎯'}
        </span>
      </div>
      <div className="checklist-progress">
        <div className="checklist-progress-fill" style={{width:`${pct}%`}}/>
      </div>
      {TCS_CHECKS.map(item => (
        <div key={item.id} className={`check-item ${checked[item.id] ? 'checked' : ''}`} onClick={() => toggle(item.id)}>
          <div className="check-box">
            <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
          </div>
          <div className="check-label-wrap">
            <div className="check-main">{item.label}</div>
            <div className="check-sub">{item.sub}</div>
          </div>
          <span className="check-badge">{item.badge}</span>
        </div>
      ))}
    </div>
  );
}

function ShiftDashPanel({ allRecords, members }) {
  const today  = todayStr();
  const todayR = allRecords.filter(r => r.date === today && r.status === 'present' && r.shift);

  const shiftData = SHIFTS.map(sh => {

  });
  const totalOnShift = shiftData.reduce((a, s) => a + s.count, 0);

  return (
    <div className="shift-dist-card">

function AuthScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pass,  setPass]  = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handleLogin = async e => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      const cred = await auth.signInWithEmailAndPassword(email.trim(), pass);
      const snap = await db.collection('users').doc(cred.user.uid).get();
      if (!snap.exists) { await auth.signOut(); setErr('Account not found in team roster.'); return; }
      const ud = snap.data();
      await db.collection('users').doc(cred.user.uid).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
      onLogin(cred.user, ud);
    } catch(ex) {
      const m = { 'auth/user-not-found':'No account with this email.','auth/wrong-password':'Incorrect password.','auth/invalid-email':'Invalid email format.','auth/too-many-requests':'Too many attempts. Try later.' };
      setErr(m[ex.code] || ex.message);
    } finally { setLoading(false); }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">🪟</div>
          <div>
            <div className="auth-logo-text">SST Windows</div>
            <div className="auth-logo-sub">PLMS Support Team</div>
          </div>
        </div>
        <div className="auth-title">Welcome back</div>
        <div className="auth-sub">Sign in with your corporate credentials to access the dashboard.</div>
        {err && <div className="error-msg">⚠️ {err}</div>}
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label className="form-label">Corporate Email</label>
            <input className="form-input" type="email" placeholder="you@company.com" value={email} onChange={e=>setEmail(e.target.value)} required/>
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="Enter password" value={pass} onChange={e=>setPass(e.target.value)} required/>
          </div>
          <button className="btn btn-primary" type="submit" disabled={loading}>
            {loading ? <><div style={{width:15,height:15,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .7s linear infinite'}}/> Signing in…</> : '→ Sign In'}
          </button>
        </form>
        <div style={{marginTop:22,textAlign:'center',color:'var(--text3)',fontSize:11,fontWeight:700,letterSpacing:'0.5px'}}>🔒 SECURED BY FIREBASE AUTHENTICATION</div>
      </div>
    </div>
  );
}

function ChangePasswordScreen({ user, onDone, toast }) {
  const [newPass, setNewPass] = useState('');
  const [confirm, setConfirm] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const handleSubmit = async e => {
    e.preventDefault(); setErr('');
    if (newPass.length < 8) { setErr('Password must be at least 8 characters.'); return; }
    if (newPass !== confirm) { setErr('Passwords do not match.'); return; }
    setLoading(true);
    try {
      await user.updatePassword(newPass);
      await db.collection('users').doc(user.uid).update({ isFirstLogin: false });
      toast('Password updated! 🎉');
      onDone();
    } catch(ex) { setErr(ex.message); } finally { setLoading(false); }
  };
  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">🔐</div>
          <div>
            <div className="auth-logo-text">Set New Password</div>
            <div className="auth-logo-sub">ONE-TIME SETUP REQUIRED</div>
          </div>
        </div>
        <div className="auth-title">Secure your account</div>
        <div className="auth-sub">First login detected. Create a permanent password to continue.</div>
        {err && <div className="error-msg">⚠️ {err}</div>}
        <form onSubmit={handleSubmit}>
          <div className="form-group"><label className="form-label">New Password</label><input className="form-input" type="password" placeholder="Min. 8 characters" value={newPass} onChange={e=>setNewPass(e.target.value)} required/></div>
          <div className="form-group"><label className="form-label">Confirm Password</label><input className="form-input" type="password" placeholder="Repeat password" value={confirm} onChange={e=>setConfirm(e.target.value)} required/></div>
          <button className="btn btn-primary" type="submit" disabled={loading}>{loading?'Updating…':'→ Set Password & Continue'}</button>
        </form>
      </div>
    </div>
  );
}

function DashboardPage({ allRecords, members }) {
  const today    = todayStr();
  const todayRecs = allRecords.filter(r => r.date === today);
  const total    = members.length;
  const present  = todayRecs.filter(r => r.status === 'present').length;
  const half     = todayRecs.filter(r => r.status === 'first_half' || r.status === 'second_half').length;
  const absent   = todayRecs.filter(r => r.status === 'absent').length;
  const noMark   = total - todayRecs.length;

  const leaveCounts = { Sick:0, Casual:0, Earned:0, 'Comp Off':0 };
  todayRecs.filter(r=>r.status==='absent').forEach(r => { if(r.leaveType) leaveCounts[r.leaveType]=(leaveCounts[r.leaveType]||0)+1; });

  const recentActivity = [...allRecords].sort((a,b)=>(b.updatedAt?.seconds||0)-(a.updatedAt?.seconds||0)).slice(0,8);

  return (
    <div className="fade-in">
      <div className="grid grid-4 section-gap">
        {[
          { cls:'blue',   icon:'👥', label:'Total Members', value:total,         sub:'Active team members' },
          { cls:'green',  icon:'✅', label:'Present Today', value:present+half,  sub:`${half} on half day` },
          { cls:'red',    icon:'🏖️', label:'On Leave',       value:absent,        sub:'Full absences' },
          { cls:'yellow', icon:'⏳', label:'Not Marked',     value:noMark,        sub:'Awaiting response' },
        ].map((s,i) => (
          <div key={i} className={`stat-card ${s.cls} fade-in`} style={{animationDelay:`${i*.07}s`}}>
            <div className="stat-icon">{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      <div className="section-gap">
        <ShiftDashPanel allRecords={allRecords} members={members}/>
      </div>

      <div className="grid grid-2 section-gap">
        <div className="card">
          <div className="card-title">
            🗓️ Today's Overview
            <span style={{marginLeft:'auto',color:'var(--text2)',fontSize:11,fontWeight:600}}>{new Date().toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long'})}</span>
          </div>
          {members.length === 0 ? <div className="text-muted text-sm">No team members yet.</div> : members.map(m => {
            const rec = todayRecs.find(r => r.userId === m.id);
            const sh  = rec?.shift ? SHIFTS.find(s => s.id === rec.shift) : null;
            return (
              <div key={m.id} style={{padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div className="avatar" style={{background:getAvatarColor(m.name),width:32,height:32,fontSize:12}}>{getInitials(m.name)}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,letterSpacing:'-0.1px'}}>{m.name}</div>
                    <div style={{fontSize:11,color:'var(--text2)'}}>{m.email}</div>
                  </div>
                  {rec ? (
                    <span className={`badge ${rec.status==='absent'?(rec.leaveType||'absent').toLowerCase().replace(' ',''):'present'}`}>
                      {rec.status==='present'?'Present':rec.status==='first_half'?'1st Half':rec.status==='second_half'?'2nd Half':rec.leaveType||'Absent'}
                    </span>
                  ) : <span style={{fontSize:11,color:'var(--text3)'}}>—</span>}
                </div>
                {sh && (
                  <div style={{marginLeft:44,marginTop:4}}>
                    <span style={{fontSize:10,fontFamily:'var(--font-mono)',fontWeight:600,color:sh.color,padding:'1px 7px',background:`${sh.color}15`,borderRadius:99,border:`1px solid ${sh.color}30`}}>
                      {sh.icon} {sh.short}
                    </span>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <div>
          <div className="card section-gap" style={{marginBottom:16}}>
            <div className="card-title">🏖️ Leave Breakdown Today</div>
            <div className="grid grid-2">
              {Object.entries(leaveCounts).map(([type,count]) => (
                <div key={type} style={{background:'var(--surface2)',borderRadius:'var(--radius-sm)',padding:'12px 14px',border:'1px solid var(--border2)'}}>
                  <div style={{fontSize:10,color:'var(--text2)',marginBottom:5,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.6px'}}>{type}</div>
                  <div style={{fontFamily:'var(--font-head)',fontSize:26,fontWeight:800,letterSpacing:'-1px'}}>{count}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="card">
            <div className="card-title">🕒 Recent Activity</div>
            {recentActivity.length === 0 ? <div className="text-muted text-sm">No activity yet.</div> : recentActivity.map((r,i) => {
              const sh = r.shift ? SHIFTS.find(s => s.id === r.shift) : null;
              return (
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'7px 0',borderBottom:'1px solid rgba(30,45,68,.4)',fontSize:12}}>
                  <div>
                    <span style={{fontWeight:700}}>{r.userName||'Unknown'}</span>
                    <span style={{color:'var(--text2)',marginLeft:6}}>{r.status==='present'?'marked Present':r.status==='absent'?`on ${r.leaveType||'Leave'}`:r.status==='first_half'?'1st Half':'2nd Half'}</span>
                    {sh && <span style={{marginLeft:6,fontSize:10,fontFamily:'var(--font-mono)',color:sh.color,fontWeight:600}}>{sh.icon}{sh.short}</span>}
                  </div>
                  <div style={{color:'var(--text3)',flexShrink:0}}>{r.updatedAt?fmtTime(r.updatedAt):fmtDate(r.date)}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════ ATTENDANCE PAGE — KEY CHANGE HERE ═══════════ */
function AttendancePage({ user, userData, toast }) {
  const today   = todayStr();
  const [status,    setStatus]    = useState('');
  const [shift,     setShift]     = useState('');
  const [leaveType, setLeaveType] = useState('');
  const [leaveId,   setLeaveId]   = useState('');
  const [saving,    setSaving]    = useState(false);
  const [existing,  setExisting]  = useState(null);
  const [loading,   setLoading]   = useState(true);
  const [history,   setHistory]   = useState([]);
  const [showShiftModal, setShowShiftModal] = useState(false);
  // Track which status triggered the shift modal so we can apply it after confirmation
  const [pendingStatus, setPendingStatus] = useState('');

  useEffect(() => {
    const recId = `${user.uid}_${today}`;
    db.collection('attendance').doc(recId).get().then(snap => {
      if (snap.exists) {
        const d = snap.data();
        setExisting(d); setStatus(d.status); setShift(d.shift||'');
        setLeaveType(d.leaveType||''); setLeaveId(d.leaveId||'');
      }
      setLoading(false);
    });
    db.collection('attendance').where('userId','==',user.uid).orderBy('date','desc').limit(15).get().then(snap => {
      setHistory(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
  }, [user.uid]);

  // All three "present" statuses now trigger the shift modal
  const handleStatusClick = id => {
    if (id === 'present' || id === 'first_half' || id === 'second_half') {
      setPendingStatus(id);
      setShowShiftModal(true);
    } else {
      // absent — clear shift, set status directly
      setStatus(id);
      setShift('');
    }
  };

  const handleShiftConfirm = shiftId => {
    setStatus(pendingStatus);
    setShift(shiftId);
    setLeaveType(''); setLeaveId('');
    setShowShiftModal(false);
    const sh = SHIFTS.find(s => s.id === shiftId);
    const statusLabel = pendingStatus === 'present' ? 'Present' : pendingStatus === 'first_half' ? 'First Half' : 'Second Half';
    toast(`${sh.icon} ${sh.name} · ${statusLabel} selected!`);
    setPendingStatus('');
  };

  const handleShiftModalClose = () => {
    setShowShiftModal(false);
    setPendingStatus('');
    // Don't change status if user cancels
  };

  const handleSave = async () => {
    if (!status) { toast('Please select an attendance option.', 'error'); return; }
    if (status === 'absent' && !leaveType) { toast('Please select a leave type.', 'error'); return; }
    setSaving(true);
    const recId = `${user.uid}_${today}`;
    const data = {
      userId: user.uid, userName: userData.name||user.email, userEmail: user.email,
      date: today, status,
      shift:     (status === 'present' || status === 'first_half' || status === 'second_half') ? shift : '',
      leaveType: status === 'absent'  ? leaveType : '',
      leaveId:   status === 'absent'  ? leaveId   : '',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    if (!existing) data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    try {
      await db.collection('attendance').doc(recId).set(data, {merge:true});
      await db.collection('auditLog').add({ ...data, action: existing?'UPDATE':'CREATE', actor: userData.name||user.email });
      setExisting(data);
      const sh = shift ? SHIFTS.find(s=>s.id===shift) : null;
      const statusLabel = status === 'present' ? 'Present' : status === 'first_half' ? 'First Half' : status === 'second_half' ? 'Second Half' : 'Absent';
      toast(existing ? 'Attendance updated ✅' : `Marked ${statusLabel}${sh?` · ${sh.name}`:''} ✅`);
      setHistory(h => [data, ...h.filter(r=>r.date!==today)]);
    } catch(ex) { toast(ex.message,'error'); } finally { setSaving(false); }
  };

  const selectedShift = shift ? SHIFTS.find(s => s.id === shift) : null;

  // Context label for the shift modal subtitle
  const pendingStatusLabel = pendingStatus === 'present' ? 'Present (Full Day)' : pendingStatus === 'first_half' ? 'First Half' : pendingStatus === 'second_half' ? 'Second Half' : '';

  if (loading) return <div style={{textAlign:'center',padding:40,color:'var(--text2)'}}>Loading…</div>;

  return (
    <div className="fade-in">
      {showShiftModal && (
        <ShiftModal
          onConfirm={handleShiftConfirm}
          onClose={handleShiftModalClose}
          contextLabel={pendingStatusLabel}
        />
      )}

      <div className="grid grid-2">
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-title">
              📋 Mark Attendance
              <span style={{marginLeft:'auto',color:'var(--text2)',fontSize:11,fontWeight:600}}>{new Date().toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</span>
            </div>
            {existing && <div className="success-msg" style={{marginBottom:16}}>✅ Already marked today — you can update below.</div>}

            <div className="att-grid">
              {STATUS_OPTIONS.map(opt => (
                <div
                  key={opt.id}
                  className={`att-btn ${opt.cls} ${status===opt.id?'selected':''}`}
                  onClick={() => handleStatusClick(opt.id)}
                >
                  <span className="att-btn-icon">{opt.icon}</span>
                  <div className="att-btn-label">{opt.label}</div>
                  <div className="att-btn-sub">{opt.sub}</div>
                  {(opt.id==='present'||opt.id==='first_half'||opt.id==='second_half') && status===opt.id && selectedShift && (
                    <div style={{marginTop:5,fontSize:10,fontFamily:'var(--font-mono)',fontWeight:600,color:selectedShift.color}}>{selectedShift.short}</div>
                  )}
                </div>
              ))}
            </div>

            {/* Shift banner — shown for present / first_half / second_half */}
            {(status === 'present' || status === 'first_half' || status === 'second_half') && selectedShift && (
              <div className="shift-selected-banner" style={{background:selectedShift.bg, border:`1px solid ${selectedShift.border}`}}>
                <span className="shift-selected-icon">{selectedShift.icon}</span>
                <div className="shift-selected-info">
                  <div className="shift-selected-name" style={{color:selectedShift.color}}>{selectedShift.name}</div>
                  <div className="shift-selected-time" style={{color:selectedShift.color,opacity:0.8}}>{selectedShift.time}</div>
                </div>
                <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={() => { setPendingStatus(status); setShowShiftModal(true); }}>Change</button>
              </div>
            )}
            {(status === 'present' || status === 'first_half' || status === 'second_half') && !selectedShift && (
              <div style={{padding:'10px 13px',background:'rgba(245,176,20,0.07)',border:'1px solid rgba(245,176,20,0.2)',borderRadius:'var(--radius-sm)',marginBottom:12,fontSize:12,color:'var(--yellow2)',fontWeight:600}}>
                ⚠️ Click your attendance type again to select your shift
              </div>
            )}

            {/* Leave panel */}
            {status === 'absent' && (
              <div className="leave-panel" style={{marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:13,marginBottom:10}}>🏖️ Leave Type <span style={{color:'var(--red)',marginLeft:4}}>*</span></div>
                <div className="leave-grid">
                  {LEAVE_TYPES.map(lt => (
                    <div key={lt} className={`leave-type-btn ${leaveType===lt?'selected':''}`} onClick={()=>setLeaveType(lt)}>{lt}</div>
                  ))}
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label className="form-label">Leave ID <span style={{color:'var(--text3)'}}>— Optional</span></label>
                  <input className="form-input" placeholder="e.g. HR-2024-045" value={leaveId} onChange={e=>setLeaveId(e.target.value)}/>
                </div>
              </div>
            )}

            <button className="btn btn-primary mt-16" onClick={handleSave} disabled={saving}>
              {saving ? 'Saving…' : existing ? '↻ Update Attendance' : '✓ Mark Attendance'}
            </button>
          </div>

          <div className="card">
            <div className="card-title">✅ Daily Compliance</div>
            <TCSChecklist userId={user.uid} today={today} toast={toast}/>
          </div>
        </div>

        <div className="card">
          <div className="card-title">📆 My Attendance History</div>
          {history.length === 0 ? <div className="text-muted text-sm">No records yet.</div> : (
            <div className="table-wrap">
              <table>
                <thead><tr><th>Date</th><th>Status</th><th>Shift</th><th>Leave</th></tr></thead>
                <tbody>
                  {history.map((r,i) => {
                    const sh = r.shift ? SHIFTS.find(s=>s.id===r.shift) : null;
                    return (
                      <tr key={i}>
                        <td style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text2)'}}>{r.date}</td>
                        <td><span className={`badge ${r.status==='present'?'present':r.status==='absent'?'absent':'half'}`}>{r.status==='first_half'?'1st Half':r.status==='second_half'?'2nd Half':r.status}</span></td>
                        <td>
                          {sh ? (
                            <span style={{fontSize:10,fontFamily:'var(--font-mono)',fontWeight:700,color:sh.color}}>
                              {sh.icon} {sh.short}
                            </span>
                          ) : '—'}
                        </td>
                        <td>{r.leaveType ? <span className={`badge ${(r.leaveType||'').toLowerCase().replace(' ','')}`}>{r.leaveType}</span> : '—'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function CalendarPage({ allRecords, members }) {
  const now = new Date();
  const [year, setYear]   = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [selected, setSelected] = useState(null);
  const daysInMonth = getDaysInMonth(year,month);
  const firstDay    = getFirstDayOfMonth(year,month);
  const monthStr    = String(month+1).padStart(2,'0');
  const monthName   = new Date(year,month).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const today       = todayStr();
  const dayData = {};
  allRecords.forEach(r => {
    if(r.date&&r.date.startsWith(`${year}-${monthStr}`)){
      const day=parseInt(r.date.split('-')[2]);
      if(!dayData[day])dayData[day]=[];
      dayData[day].push(r);
    }
  });
  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); setSelected(null); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); setSelected(null); };
  const selRecs = selected?(dayData[selected]||[]):[];
  return (
    <div className="fade-in grid grid-2" style={{alignItems:'start'}}>
      <div className="card">
        <div className="calendar-header">
          <button className="btn btn-ghost btn-sm" onClick={prevMonth}>‹ Prev</button>
          <div style={{fontFamily:'var(--font-head)',fontWeight:800,fontSize:15,letterSpacing:'-0.3px'}}>{monthName}</div>
          <button className="btn btn-ghost btn-sm" onClick={nextMonth}>Next ›</button>
        </div>
        <div className="calendar-grid">
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} className="cal-day-label">{d}</div>)}
          {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
          {Array.from({length:daysInMonth}).map((_,i)=>{
            const day=i+1;
            const ds=`${year}-${monthStr}-${String(day).padStart(2,'0')}`;
            const recs=dayData[day]||[];
            const pC=recs.filter(r=>r.status!=='absent').length;
            const aC=recs.filter(r=>r.status==='absent').length;
            let cls='';
            if(pC>0&&aC===0)cls='present';
            else if(aC>0&&pC===0)cls='absent';
            else if(pC>0&&aC>0)cls='half';
            return (
              <div key={day} className={`cal-day ${ds===today?'today':''} ${cls}`}
                onClick={()=>setSelected(selected===day?null:day)}
                style={selected===day?{outline:'2px solid var(--accent)',outlineOffset:'1px'}:{}}>
                <span style={{fontSize:12}}>{day}</span>
                {recs.length>0&&<div className={`cal-dot ${cls==='present'?'green':cls==='absent'?'red':'yellow'}`}/>}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:14,marginTop:16,flexWrap:'wrap'}}>
          {[{cls:'present',dot:'green',label:'All Present'},{cls:'half',dot:'yellow',label:'Mixed'},{cls:'absent',dot:'red',label:'On Leave'}].map(l=>(
            <div key={l.cls} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--text2)',fontWeight:600}}>
              <div className={`cal-dot ${l.dot}`}/>{l.label}
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        {selected ? (
          <>
            <div className="card-title">
              {`${String(selected).padStart(2,'0')} ${new Date(year,month).toLocaleDateString('en-IN',{month:'long'})} ${year}`}
              <span style={{marginLeft:'auto',fontSize:11,color:'var(--text2)',fontWeight:600}}>
                <span className="live-dot"/>{selRecs.length}/{members.length}
              </span>
            </div>
            {selRecs.length===0?<div className="text-muted text-sm">No records.</div>:selRecs.map((r,i)=>{
              const sh=r.shift?SHIFTS.find(s=>s.id===r.shift):null;
              return (
                <div key={i} style={{padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div className="avatar" style={{background:getAvatarColor(r.userName||''),width:30,height:30,fontSize:11}}>{getInitials(r.userName||'')}</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:700}}>{r.userName||r.userEmail}</div>
                        {r.leaveType&&<div style={{fontSize:11,color:'var(--text2)'}}>{r.leaveType}{r.leaveId?` · ${r.leaveId}`:''}</div>}
                      </div>
                    </div>
                    <span className={`badge ${r.status==='present'?'present':r.status==='absent'?'absent':'half'}`}>{r.status==='first_half'?'1st Half':r.status==='second_half'?'2nd Half':r.status}</span>
                  </div>
                  {sh&&<div style={{marginLeft:40,marginTop:4,fontSize:10,fontFamily:'var(--font-mono)',fontWeight:700,color:sh.color}}>{sh.icon} {sh.name} · {sh.short}</div>}
                </div>
              );
            })}
            <hr className="divider"/>
            <div style={{display:'flex',gap:16,fontSize:12,color:'var(--text2)',fontWeight:600}}>
              <span>✅ <b style={{color:'var(--green)'}}>{selRecs.filter(r=>r.status!=='absent').length}</b></span>
              <span>🔴 <b style={{color:'var(--red)'}}>{selRecs.filter(r=>r.status==='absent').length}</b></span>
              <span>❓ <b style={{color:'var(--text3)'}}>{members.length-selRecs.length}</b></span>
            </div>
          </>
        ) : (
          <div style={{textAlign:'center',padding:'48px 0',color:'var(--text2)'}}>
            <div style={{fontSize:40,marginBottom:12}}>📅</div>
            <div style={{fontWeight:800,fontSize:15,letterSpacing:'-0.3px'}}>Select a day</div>
            <div style={{fontSize:12,marginTop:6}}>Click any date to see attendance details</div>
          </div>
        )}
      </div>
    </div>
  );
}

  return (

        <div className="table-wrap">

            <thead><tr><th>Member</th><th>Email</th><th>Role</th><th>Today</th><th>Shift</th><th>Leave Type</th><th>Last Login</th></tr></thead>
            <tbody>
              {members.map(m=>{
                const rec=todayRecs.find(r=>r.userId===m.id);
                const sh=rec?.shift?SHIFTS.find(s=>s.id===rec.shift):null;

                    <td><div style={{display:'flex',alignItems:'center',gap:9}}><div className="avatar" style={{background:getAvatarColor(m.name||''),width:30,height:30,fontSize:11}}>{getInitials(m.name||'')}</div><span style={{fontWeight:700}}>{m.name||'—'}</span></div></td>
                    <td style={{fontSize:11,color:'var(--text2)'}}>{m.email}</td>
                    <td><span style={{fontSize:11,color:'var(--accent2)',fontWeight:700}}>{m.role||'Member'}</span></td>
                    <td>{rec?<span className={`badge ${rec.status==='present'?'present':rec.status==='absent'?'absent':'half'}`}>{rec.status==='first_half'?'1st Half':rec.status==='second_half'?'2nd Half':rec.status}</span>:<span style={{color:'var(--text3)',fontSize:11}}>Not marked</span>}</td>
                    <td>{sh?<span style={{fontSize:10,fontFamily:'var(--font-mono)',fontWeight:700,color:sh.color}}>{sh.icon} {sh.short}</span>:'—'}</td>
                    <td>{rec?.leaveType?<span className={`badge ${(rec.leaveType||'').toLowerCase().replace(' ','')}`}>{rec.leaveType}</span>:'—'}</td>
                    <td style={{fontSize:11,color:'var(--text2)'}}>{m.lastLogin?fmtDate(m.lastLogin):'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function AuditPage() {
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    db.collection('auditLog').orderBy('updatedAt','desc').limit(100).get()
      .then(snap=>{setLogs(snap.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);})
      .catch(()=>setLoading(false));
  },[]);
  return (
    <div className="fade-in card">
      <div className="card-title">🔍 Audit Log <span style={{marginLeft:'auto',fontSize:11,color:'var(--text2)',fontWeight:600}}>Last 100 entries</span></div>
      {loading?<div className="text-muted text-sm">Loading…</div>:logs.length===0?<div className="text-muted text-sm">No entries yet.</div>:(
        <div className="table-wrap">
          <table>
            <thead><tr><th>Actor</th><th>Action</th><th>Status</th><th>Shift</th><th>Leave</th><th>Date</th><th>Time</th></tr></thead>
            <tbody>
              {logs.map((l,i)=>{
                const sh=l.shift?SHIFTS.find(s=>s.id===l.shift):null;
                return (
                  <tr key={i}>
                    <td style={{fontWeight:700}}>{l.actor||l.userName||'—'}</td>
                    <td><span style={{fontSize:11,fontWeight:800,color:l.action==='CREATE'?'var(--green)':'var(--yellow)'}}>{l.action||'UPDATE'}</span></td>
                    <td><span className={`badge ${l.status==='present'?'present':l.status==='absent'?'absent':'half'}`}>{l.status==='first_half'?'1st Half':l.status==='second_half'?'2nd Half':l.status}</span></td>
                    <td>{sh?<span style={{fontSize:10,fontFamily:'var(--font-mono)',fontWeight:700,color:sh.color}}>{sh.icon} {sh.short}</span>:'—'}</td>
                    <td>{l.leaveType?<span className={`badge ${(l.leaveType||'').toLowerCase().replace(' ','')}`}>{l.leaveType}</span>:'—'}</td>
                    <td style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text2)'}}>{l.date||'—'}</td>
                    <td style={{fontSize:11,color:'var(--text2)'}}>{l.updatedAt?fmtTime(l.updatedAt):'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function ManagePage({ members, toast, onRefresh }) {
  const [showAdd,setShowAdd]=useState(false);
  const [name,setName]=useState(''); const [email,setEmail]=useState('');
  const [role,setRole]=useState('Member'); const [tempPass,setTempPass]=useState('');
  const [adding,setAdding]=useState(false); const [err,setErr]=useState('');
  const [removing,setRemoving]=useState(null);

  const handleAdd = async e => {
    e.preventDefault(); setErr('');
    if(!name||!email||!tempPass){setErr('All fields required.');return;}
    if(tempPass.length<6){setErr('Temp password min 6 chars.');return;}
    setAdding(true);
    try {
      const cred=await auth.createUserWithEmailAndPassword(email.trim(),tempPass);
      await db.collection('users').doc(cred.user.uid).set({name,email:email.trim(),role,isFirstLogin:true,createdAt:firebase.firestore.FieldValue.serverTimestamp(),lastLogin:null});
      await auth.signOut();
      toast(`${name} added ✅`);
      setShowAdd(false);setName('');setEmail('');setTempPass('');setRole('Member');onRefresh();
    } catch(ex){setErr(ex.message);}finally{setAdding(false);}
  };
  const handleRemove = async m => {
    if(!window.confirm(`Remove ${m.name}?`))return;
    setRemoving(m.id);
    try{await db.collection('users').doc(m.id).delete();toast(`${m.name} removed.`);onRefresh();}
    catch(ex){toast(ex.message,'error');}finally{setRemoving(null);}
  };
  return (
    <div className="fade-in card">
      <div className="flex-row" style={{marginBottom:16}}>
        <div className="card-title" style={{margin:0}}>⚙️ Manage Team Members</div>
        <div className="spacer"/>
        <button className="btn btn-primary btn-sm" style={{width:'auto'}} onClick={()=>setShowAdd(!showAdd)}>{showAdd?'✕ Cancel':'＋ Add Member'}</button>
      </div>
      {showAdd&&(
        <form onSubmit={handleAdd} style={{background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:'var(--radius)',padding:18,marginBottom:20}}>
          <div style={{fontWeight:800,marginBottom:14,fontSize:14}}>➕ New Team Member</div>
          {err&&<div className="error-msg">{err}</div>}
          <div className="grid grid-2" style={{gap:12}}>
            <div className="form-group" style={{marginBottom:0}}><label className="form-label">Full Name</label><input className="form-input" placeholder="John Smith" value={name} onChange={e=>setName(e.target.value)} required/></div>
            <div className="form-group" style={{marginBottom:0}}><label className="form-label">Email</label><input className="form-input" type="email" placeholder="john@company.com" value={email} onChange={e=>setEmail(e.target.value)} required/></div>
            <div className="form-group" style={{marginBottom:0}}><label className="form-label">Role</label><select className="form-input" value={role} onChange={e=>setRole(e.target.value)}><option>Member</option><option>Lead</option><option>Manager</option><option>Admin</option></select></div>
            <div className="form-group" style={{marginBottom:0}}><label className="form-label">Temp Password</label><input className="form-input" type="password" placeholder="Min 6 chars" value={tempPass} onChange={e=>setTempPass(e.target.value)} required/></div>
          </div>
          <button className="btn btn-primary mt-12" type="submit" disabled={adding} style={{width:'auto',padding:'10px 24px'}}>{adding?'Creating…':'Create Account'}</button>
          <div style={{fontSize:11,color:'var(--text2)',marginTop:8,fontWeight:600}}>ℹ️ User will be prompted to change password on first login.</div>
        </form>
      )}
      {members.length===0?<div className="text-muted text-sm">No members yet.</div>:members.map(m=>(
        <div key={m.id} className="member-row">
          <div className="avatar" style={{background:getAvatarColor(m.name||''),width:38,height:38,fontSize:14}}>{getInitials(m.name||'')}</div>
          <div className="member-info">
            <div className="member-name">{m.name||'—'}</div>
            <div className="member-email">{m.email}</div>
          </div>
          <span style={{fontSize:11,color:'var(--accent2)',fontWeight:700}}>{m.role||'Member'}</span>
          {m.isFirstLogin&&<span style={{fontSize:10,background:'rgba(245,176,20,0.1)',color:'var(--yellow2)',padding:'2px 8px',borderRadius:99,border:'1px solid rgba(245,176,20,0.25)',fontWeight:800}}>FIRST LOGIN</span>}
          <button className="btn btn-danger btn-sm" onClick={()=>handleRemove(m)} disabled={removing===m.id}>{removing===m.id?'…':'✕'}</button>
        </div>
      ))}
    </div>
  );
}

function ExportPage({ allRecords, members, toast }) {
  const [loading, setLoading] = useState('');
  const buildCSV = recs => {
    const hdr = ['Date','Member Name','Email','Status','Shift','Shift Time','Leave Type','Leave ID','Updated At'];
    const rows = recs.map(r => {
      const sh = r.shift ? SHIFTS.find(s=>s.id===r.shift) : null;
      return [r.date||'',r.userName||'',r.userEmail||'',r.status||'',sh?.name||'',sh?.short||'',r.leaveType||'',r.leaveId||'',r.updatedAt?(r.updatedAt.toDate?r.updatedAt.toDate().toISOString():r.updatedAt):''];
    });
    return [hdr,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  };
  const dl = (csv,fn) => { const b=new Blob([csv],{type:'text/csv;charset=utf-8;'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fn;a.click();URL.revokeObjectURL(u); };
  const today = todayStr(), now = new Date();
  const prefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const exportFns = {
    daily:   ()=>{ dl(buildCSV(allRecords.filter(r=>r.date===today)),`attendance_daily_${today}.csv`); toast('Daily downloaded ✅'); },
    weekly:  ()=>{ const d=now.getDay(),m=new Date(now);m.setDate(now.getDate()-(d===0?6:d-1));m.setHours(0,0,0,0);dl(buildCSV(allRecords.filter(r=>new Date(r.date)>=m)),`attendance_weekly_${dateKey(m)}.csv`);toast('Weekly downloaded ✅'); },
    monthly: ()=>{ dl(buildCSV(allRecords.filter(r=>r.date&&r.date.startsWith(prefix))),`attendance_monthly_${prefix}.csv`);toast('Monthly downloaded ✅'); },
    full:    ()=>{ dl(buildCSV(allRecords),`attendance_full_${today}.csv`);toast('Full export downloaded ✅'); },
  };
  const totalToday=allRecords.filter(r=>r.date===today).length;
  const totalMonth=allRecords.filter(r=>r.date&&r.date.startsWith(prefix)).length;
  return (
    <div className="fade-in">
      <div className="grid grid-4 section-gap">
        {[{icon:'📊',label:'Total Records',value:allRecords.length,sub:'All time'},{icon:'📅',label:'Today',value:totalToday,sub:'Marks today'},{icon:'📆',label:'This Month',value:totalMonth,sub:'Records'},{icon:'👥',label:'Team Size',value:members.length,sub:'Active'}].map((s,i)=>(
          <div key={i} className="stat-card blue fade-in" style={{animationDelay:`${i*.07}s`}}>
            <div className="stat-icon">{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-title">📤 Export Reports</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:14}}>
          {[{key:'daily',icon:'📋',label:'Daily Report',sub:`Today — ${today}`},{key:'weekly',icon:'📆',label:'Weekly Report',sub:'Mon – today'},{key:'monthly',icon:'🗓️',label:'Monthly Report',sub:now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})},{key:'full',icon:'📦',label:'Full Export',sub:'All records all time'}].map(btn=>(
            <div key={btn.key} style={{background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:'var(--radius)',padding:'18px'}}>
              <div style={{fontSize:28,marginBottom:10}}>{btn.icon}</div>
              <div style={{fontFamily:'var(--font-head)',fontWeight:800,fontSize:14,marginBottom:4,letterSpacing:'-0.2px'}}>{btn.label}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:14,fontWeight:500}}>{btn.sub}</div>
              <button className="btn btn-secondary btn-sm" style={{width:'100%'}} onClick={async()=>{setLoading(btn.key);exportFns[btn.key]();setLoading('');}} disabled={loading===btn.key}>{loading===btn.key?'⬇️ Preparing…':'⬇️ Download CSV'}</button>
            </div>
          ))}
        </div>
        <div style={{marginTop:18,fontSize:12,color:'var(--text2)',background:'var(--surface2)',padding:'12px 14px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border2)',fontWeight:500}}>
          ℹ️ CSV includes: Date · Name · Email · Status · Shift · Shift Time · Leave Type · Leave ID · Timestamp
        </div>
      </div>
    </div>
  );
}

function App() {
  const [authState,   setAuthState]   = useState('loading');
  const [fireUser,    setFireUser]    = useState(null);
  const [userData,    setUserData]    = useState(null);
  const [page,        setPage]        = useState('dashboard');
  const [members,     setMembers]     = useState([]);
  const [allRecords,  setAllRecords]  = useState([]);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const { toasts, add: addToast }     = useToast();

  useEffect(() => {
    return auth.onAuthStateChanged(async u => {
      if (u) {
        const snap = await db.collection('users').doc(u.uid).get();
        if (snap.exists) {
          const data = snap.data();
          setFireUser(u); setUserData(data);
          setAuthState(data.isFirstLogin ? 'first-login' : 'app');
        } else { await auth.signOut(); setAuthState('auth'); }
      } else { setFireUser(null); setUserData(null); setAuthState('auth'); }
    });
  }, []);

  const loadMembers = useCallback(() => {
    db.collection('users').get().then(snap => setMembers(snap.docs.map(d=>({id:d.id,...d.data()}))));
  }, []);

  useEffect(() => {
    if (authState !== 'app') return;
    loadMembers();
    return db.collection('attendance').orderBy('date','desc').onSnapshot(snap => {
      setAllRecords(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
  }, [authState, loadMembers]);

  const pageTitles = { dashboard:'Dashboard', attendance:'My Attendance', calendar:'Calendar View', team:'Team Overview', audit:'Audit Log', manage:'Manage Team', export:'Export Reports' };

  if (authState==='loading') return (
    <div className="loader-wrap">
      <div className="spinner"/>
      <div style={{color:'var(--text2)',fontSize:13,fontWeight:600,letterSpacing:'0.3px'}}>Loading SST Windows…</div>
    </div>
  );
  if (authState==='auth') return <AuthScreen onLogin={(u,d)=>{setFireUser(u);setUserData(d);setAuthState(d.isFirstLogin?'first-login':'app');}}/>;
  if (authState==='first-login') return <ChangePasswordScreen user={fireUser} onDone={()=>setAuthState('app')} toast={addToast}/>;

  const isAdmin = userData?.role==='Admin' || userData?.role==='Manager';

  return (
    <div className="app-shell">
      <div className={`sidebar-overlay ${sidebarOpen?'show':''}`} onClick={()=>setSidebarOpen(false)}/>
      <aside className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="sidebar-logo">
          <div className="sidebar-logo-icon">🪟</div>
          <div>
            <div className="sidebar-logo-name">SST Windows</div>
            <div className="sidebar-logo-sub">PLMS SUPPORT</div>
          </div>
        </div>
        <div className="sidebar-user">
          <div className="sidebar-user-inner">
            <div className="sidebar-user-name">{userData?.name || fireUser?.email}</div>
            <div className="sidebar-user-role">{fireUser?.email}</div>
            <div className="sidebar-user-badge">{userData?.role || 'Member'}</div>
          </div>
        </div>
        <nav className="sidebar-nav">
          {['main','manage'].map(section => {
            const items = NAV.filter(n=>n.section===section&&(section==='main'||isAdmin));
            if(!items.length) return null;
            return (
              <div key={section}>
                <div className="nav-section-label">{section==='main'?'Main':'Management'}</div>
                {items.map(n=>(
                  <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>{setPage(n.id);setSidebarOpen(false);}}>
                    <span className="nav-icon">{n.icon}</span>{n.label}
                  </div>
                ))}
              </div>
            );
          })}
        </nav>
        <div className="sidebar-footer">
          <button className="btn btn-ghost" style={{width:'100%',justifyContent:'flex-start'}} onClick={()=>auth.signOut()}>🚪 Sign Out</button>
        </div>
      </aside>

      <main className="main-content">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}><span/><span/><span/></div>
            <div className="topbar-title">{pageTitles[page]||''}</div>
          </div>
          <div className="topbar-right">
            <span style={{fontSize:11,color:'var(--text2)',fontWeight:700,letterSpacing:'0.3px'}}>
              <span className="live-dot"/>LIVE
            </span>
            <span style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--font-mono)'}}>{new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</span>
            <div className="avatar" style={{background:getAvatarColor(userData?.name||''),width:34,height:34,fontSize:13}}>{getInitials(userData?.name||'')}</div>
          </div>
        </div>
        <div className="page-content">
          {page==='dashboard'  && <DashboardPage  allRecords={allRecords} members={members}/>}
          {page==='attendance' && <AttendancePage user={fireUser} userData={userData} toast={addToast}/>}
          {page==='calendar'   && <CalendarPage   allRecords={allRecords} members={members}/>}
          {page==='team'       && <TeamPage        allRecords={allRecords} members={members}/>}
          {page==='audit'      && <AuditPage/>}
          {page==='manage'     && <ManagePage      members={members} toast={addToast} onRefresh={loadMembers}/>}
          {page==='export'     && <ExportPage      allRecords={allRecords} members={members} toast={addToast}/>}
        </div>
      </main>
      <Toast toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
