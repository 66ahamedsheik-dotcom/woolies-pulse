<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Windows | Pulse Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #4f46e5; --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --text-light: #64748b; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .nav-rail { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
        .nav-link { padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; color: var(--text-light); border: 1px solid transparent; white-space: nowrap; }
        .nav-link.active { background: var(--brand); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .card { background: var(--surface); border-radius: 20px; padding: 24px; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; margin-bottom: 24px; }
        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; transition: 0.2s; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-primary { background: var(--brand); color: white; width: 100%; }
        .btn-primary:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
        .leave-box { background: #fef2f2; border: 1px solid #fee2e2; border-radius: 16px; padding: 20px; margin-top: 15px; }
        .form-control { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 8px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 16px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAKV7ShVU8o-FS4G08pzIEACeR_YOib51Y",
            authDomain: "woolies-pulse.firebaseapp.com",
            projectId: "woolies-pulse",
            storageBucket: "woolies-pulse.firebasestorage.app",
            messagingSenderId: "754063512378",
            appId: "1:754063512378:web:81d15e6a5d9950d6183603"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState("Dashboard");
            const [team, setTeam] = useState([]);
            const [logs, setLogs] = useState([]);
            const [showLeaveOptions, setShowLeaveOptions] = useState(false);
            const [alreadyMarked, setAlreadyMarked] = useState(false);

            useEffect(() => {
                const unsubT = db.collection("team").onSnapshot(s => setTeam(s.docs.map(d => ({id:d.id, ...d.data()}))));
                const unsubL = db.collection("attendance").orderBy("timestamp", "desc").onSnapshot(s => {
                    const data = s.docs.map(d => ({id:d.id, ...d.data()}));
                    setLogs(data);
                    if(user) {
                        const marked = data.some(l => l.email === user.email && l.date === new Date().toLocaleDateString());
                        setAlreadyMarked(marked);
                    }
                });
                return () => { unsubT(); unsubL(); };
            }, [user]);

            const markStatus = async (status, leaveId = "") => {
                if(alreadyMarked) return;
                await db.collection("attendance").add({
                    email: user.email,
                    status,
                    leaveId,
                    date: new Date().toLocaleDateString(),
                    time: new Date().toLocaleTimeString(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert(`Attendance marked: ${status}`);
                setShowLeaveOptions(false);
            };

            const downloadCSV = () => {
                const headers = ["Date", "Time", "Email", "Status", "Leave ID"];
                const rows = logs.map(l => [l.date, l.time, l.email, l.status, l.leaveId || "-"]);
                let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `SST_Pulse_Report_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
            };

            if (!user) return (
                <div style={{display:'flex', height:'100vh', alignItems:'center', justifyContent:'center'}}>
                    <div className="card" style={{width:'350px', textAlign:'center'}}>
                        <h2 style={{color:'var(--brand)'}}>SST Windows Pulse</h2>
                        <form onSubmit={(e) => {
                            e.preventDefault();
                            const email = e.target.email.value.toLowerCase().trim();
                            setUser({ email, isAdmin: email.includes("sheik") });
                        }}>
                            <input name="email" className="form-control" placeholder="Corporate Email" required />
                            <input name="pass" type="password" className="form-control" placeholder="Password" required style={{margin:'15px 0'}} />
                            <button className="btn btn-primary">Sign In</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div>
                    <header className="glass-header">
                        <span style={{fontWeight:800, fontSize:'18px'}}>SST WINDOWS <span style={{color:'var(--brand)'}}>PULSE</span></span>
                        <div style={{display:'flex', alignItems:'center', gap:'15px'}}>
                            <small>{user.email}</small>
                            <button onClick={()=>setUser(null)} className="btn" style={{padding:'6px 12px', fontSize:'12px', background:'#f1f5f9'}}>Logout</button>
                        </div>
                    </header>

                    <div className="app-container">
                        <nav className="nav-rail">
                            {["Dashboard", "Mark Today", "Calendar", "Audit Log", "Export", "Manage Team"].map(tab => (
                                <div key={tab} className={`nav-link ${view === tab ? 'active' : ''}`} onClick={()=>setView(tab)}>{tab}</div>
                            ))}
                        </nav>

                        {view === "Dashboard" && (
                            <div>
                                <div className="stat-grid">
                                    <div className="card"><h3>28</h3><p>Total Team</p></div>
                                    <div className="card" style={{color:'var(--success)'}}><h3>{logs.filter(l => l.date === new Date().toLocaleDateString() && l.status === "Full Day Operational").length}</h3><p>Active Now</p></div>
                                    <div className="card" style={{color:'var(--danger)'}}><h3>{logs.filter(l => l.date === new Date().toLocaleDateString() && l.status.includes("Leave")).length}</h3><p>Away</p></div>
                                </div>
                                <div className="card" style={{padding:0}}>
                                    <table>
                                        <thead><tr><th>Name</th><th>Email</th><th>Status</th></tr></thead>
                                        <tbody>
                                            {team.map(member => (
                                                <tr key={member.id}>
                                                    <td>{member.name}</td>
                                                    <td>{member.email}</td>
                                                    <td><b>{logs.find(l => l.email === member.email && l.date === new Date().toLocaleDateString())?.status || "Pending"}</b></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {view === "Mark Today" && (
                            <div className="card" style={{maxWidth:'500px', margin:'0 auto'}}>
                                <h3>Daily Status</h3>
                                <div style={{display:'grid', gap:'12px', marginTop:'20px'}}>
                                    <button className="btn btn-primary" disabled={alreadyMarked} onClick={()=>markStatus("Full Day Operational")}>Full Day Operational</button>
                                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px'}}>
                                        <button className="btn" style={{background:'#e0e7ff'}} disabled={alreadyMarked} onClick={()=>markStatus("First Half")}>First Half</button>
                                        <button className="btn" style={{background:'#e0e7ff'}} disabled={alreadyMarked} onClick={()=>markStatus("Second Half")}>Second Half</button>
                                    </div>
                                    <button className="btn" style={{background:'#fee2e2', color:'#b91c1c'}} disabled={alreadyMarked} onClick={()=>setShowLeaveOptions(!showLeaveOptions)}>Mark Leave</button>
                                    
                                    {showLeaveOptions && (
                                        <div className="leave-box">
                                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px'}}>
                                                {["Sick Leave", "Earned Leave", "Casual Leave", "Comp Off"].map(type => (
                                                    <button key={type} className="btn" style={{fontSize:'12px', background:'white', border:'1px solid #fecaca'}} onClick={()=>markStatus(type, document.getElementById('lID').value)}>{type}</button>
                                                ))}
                                            </div>
                                            <input id="lID" className="form-control" placeholder="Optional Leave ID" />
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === "Audit Log" && (
                            <div className="card" style={{padding:0}}>
                                <table>
                                    <thead><tr><th>Time</th><th>Email</th><th>Action</th><th>Leave ID</th></tr></thead>
                                    <tbody>
                                        {logs.map(l => (
                                            <tr key={l.id}>
                                                <td>{l.date} {l.time}</td>
                                                <td>{l.email}</td>
                                                <td><b>{l.status}</b></td>
                                                <td>{l.leaveId || "-"}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {view === "Export" && (
                            <div className="card" style={{textAlign:'center'}}>
                                <h3>Download Reports</h3>
                                <p>Generate a CSV file of all attendance records for the month.</p>
                                <button className="btn btn-primary" style={{width:'auto', margin:'20px auto'}} onClick={downloadCSV}>Export to CSV</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
