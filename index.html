<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Windows | Pulse Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #4f46e5; --bg: #f8fafc; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .header { background: white; border-bottom: 1px solid #e2e8f0; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 25px; }
        .card { background: white; border-radius: 16px; padding: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .nav-btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: #64748b; }
        .nav-btn.active { background: var(--brand); color: white; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { text-align: center; padding: 20px; border-radius: 16px; background: white; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .status-badge { padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .present { background: #dcfce7; color: #166534; }
        .pending { background: #f1f5f9; color: #64748b; }
        .leave { background: #fee2e2; color: #991b1b; }
        .btn { padding: 12px 20px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; width: 100%; }
        .btn-primary { background: var(--brand); color: white; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #e2e8f0; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAKV7ShVU8o-FS4G08pzIEACeR_YOib51Y",
            authDomain: "woolies-pulse.firebaseapp.com",
            projectId: "woolies-pulse",
            storageBucket: "woolies-pulse.firebasestorage.app",
            messagingSenderId: "754063512378",
            appId: "1:754063512378:web:81d15e6a5d9950d6183603"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const TEAM_NAMES = [
            "Sheikahamed", "Vignesh Saravanan", "Lakshmanan", "Dineshk", "Barathcmk", 
            "Bimalm", "Gopinathg", "Harpushapsingh", "Libinshaj", "Lingeswar", 
            "Nandhinim", "Rengaswamyk", "Ramyas", "Soniyal", "Sarvananr", 
            "Sridhar", "Senthils", "Shruthiv", "Tamilselvans", "Vanishrig", 
            "Vigneshjm", "Vasanthl", "Geethapriya", "Gokul"
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState("");
            const [pass, setPass] = useState("");
            const [view, setView] = useState("Dashboard");
            const [attendance, setAttendance] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsub = db.collection("attendance").onSnapshot(s => {
                    setAttendance(s.docs.map(d => d.data()));
                    setLoading(false);
                }, (err) => {
                    console.error("Database Error:", err);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            const handleLogin = () => {
                if(email === "sheikahamed@woolworths.com" && pass === "Sheik06") {
                    setUser({ name: "Sheikahamed", email });
                } else {
                    alert("Invalid Credentials!");
                }
            };

            const submitStatus = async (status) => {
                const today = new Date().toLocaleDateString();
                if(attendance.some(a => a.name === user.name && a.date === today)) {
                    return alert("Already submitted today!");
                }
                await db.collection("attendance").add({
                    name: user.name, status, date: today, time: new Date().toLocaleTimeString()
                });
                alert("Status Updated!");
            };

            if (!user) return (
                <div style={{display:'flex', height:'100vh', alignItems:'center', justifyContent:'center'}}>
                    <div className="card" style={{width:'350px', textAlign:'center'}}>
                        <h2 style={{color:'var(--brand)'}}>SST Pulse Login</h2>
                        <input placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
                        <input type="password" placeholder="Password" value={pass} onChange={e => setPass(e.target.value)} />
                        <button className="btn btn-primary" onClick={handleLogin}>Sign In</button>
                    </div>
                </div>
            );

            const today = new Date().toLocaleDateString();
            const todayAtt = attendance.filter(a => a.date === today);

            return (
                <div>
                    <div className="header">
                        <span style={{fontWeight:800}}>SST WINDOWS <span style={{color: 'var(--brand)'}}>PULSE</span></span>
                        <div><b>{user.name}</b> <button onClick={()=>setUser(null)} className="nav-btn">Logout</button></div>
                    </div>
                    <div className="container">
                        <div className="stats">
                            <div className="stat-card"><h2>{TEAM_NAMES.length}</h2><p>TEAM</p></div>
                            <div className="stat-card" style={{color:'var(--success)'}}><h2>{todayAtt.filter(a => !a.status.includes('Leave')).length}</h2><p>PRESENT</p></div>
                            <div className="stat-card" style={{color:'var(--danger)'}}><h2>{todayAtt.filter(a => a.status.includes('Leave')).length}</h2><p>LEAVE</p></div>
                        </div>

                        <div className="card" style={{marginBottom: '20px', textAlign:'center'}}>
                            <h3>Mark Your Status</h3>
                            <div style={{display:'flex', gap:'10px', justifyContent:'center'}}>
                                <button className="btn btn-primary" style={{width:'auto'}} onClick={()=>submitStatus("Full Day Operational")}>Present</button>
                                <button className="btn" style={{width:'auto', background:'#fee2e2', color:'var(--danger)'}} onClick={()=>submitStatus("Sick Leave")}>On Leave</button>
                            </div>
                        </div>

                        <div className="card" style={{padding:0}}>
                            <table>
                                <thead style={{background:'#f8fafc'}}><tr><th>Name</th><th>Today's Status</th></tr></thead>
                                <tbody>
                                    {loading ? (
                                        <tr><td colSpan="2" style={{textAlign:'center', padding:'20px'}}>Syncing with Firebase...</td></tr>
                                    ) : (
                                        TEAM_NAMES.map(n => {
                                            const s = todayAtt.find(a => a.name === n);
                                            return (
                                                <tr key={n}>
                                                    <td>{n}</td>
                                                    <td><span className={`status-badge ${s ? (s.status.includes('Leave') ? 'leave' : 'present') : 'pending'}`}>{s ? s.status : "Pending"}</span></td>
                                                </tr>
                                            );
                                        })
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
