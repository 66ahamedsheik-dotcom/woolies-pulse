<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLMS TeamPulse</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase Config from your screenshot ---
        const firebaseConfig = {
            apiKey: "AIzaSyAKV7ShVU8o-FS4G08pzIEACeR_YOib51Y",
            authDomain: "woolies-pulse.firebaseapp.com",
            projectId: "woolies-pulse",
            storageBucket: "woolies-pulse.firebasestorage.app",
            messagingSenderId: "754063512378",
            appId: "1:754063512378:web:81d15e6a5d9950d6183603",
            measurementId: "G-603ST5X49M"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ADMIN_EMAILS = ["sheikahamed@woolworths.com", "vigneshsaravanan@woolworths.com", "lakshmanan@woolworths.com"];
        const MEMBERS = ["Sheikahamed", "Vignesh Saravanan", "Lakshmanan", "Dineshk", "Barathcmk", "Bimalm", "Gopinathg", "Harpushapsingh", "Libinshaj", "Lingeswar", "Nandhinim", "Rengaswamyk", "Ramyas", "Soniyal", "Sarvananr", "Sridhar", "Senthils", "Shruthiv", "Tamilselvans", "Vanishrig", "Vigneshjm", "Vasanthl", "Geethapriya", "Gokul"];

        const TODAY = () => new Date().toISOString().split("T")[0];

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [view, setView] = useState("attendance");
            const [auth, setAuth] = useState({ email: "", pass: "" });

            const handleLogin = () => {
                if (auth.pass === "pass") {
                    setCurrentUser({ email: auth.email.toLowerCase(), name: auth.email.split('@')[0], isAdmin: ADMIN_EMAILS.includes(auth.email.toLowerCase()) });
                } else { alert("Invalid Password"); }
            };

            const markStatus = async (status) => {
                try {
                    await db.collection("plms_team").doc(currentUser.email).set({
                        status: status,
                        date: TODAY(),
                        userName: currentUser.name,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    alert("Status captured successfully! You can check the Firebase Data tab now.");
                } catch (e) {
                    console.error("Error writing document: ", e);
                    alert("Error saving status.");
                }
            };

            if (!currentUser) {
                return (
                    <div style={S.container}>
                        <div style={S.card}>
                            <h2 style={{margin:0, color:'#1e293b'}}>TeamPulse Login</h2>
                            <p style={{fontSize:14, color:'#64748b', marginBottom:20}}>Log in to the PLMS Support Tracker</p>
                            <input style={S.input} placeholder="Email" onChange={e => setAuth({...auth, email: e.target.value})} />
                            <input style={S.input} type="password" placeholder="Password" onChange={e => setAuth({...auth, pass: e.target.value})} />
                            <button style={S.button} onClick={handleLogin}>Sign In</button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={S.app}>
                    <header style={S.header}>
                        <div style={{fontWeight:800}}>📋 PLMS TeamPulse</div>
                        <nav style={S.nav}>
                            <button style={view === "attendance" ? S.activeNav : S.navBtn} onClick={() => setView("attendance")}>Mark Today</button>
                            {currentUser.isAdmin && <button style={view === "dashboard" ? S.activeNav : S.navBtn} onClick={() => setView("dashboard")}>Dashboard</button>}
                            <button style={S.logoutBtn} onClick={() => setCurrentUser(null)}>Logout</button>
                        </nav>
                    </header>
                    <main style={S.main}>
                        {view === "attendance" && (
                            <div style={S.card}>
                                <h3 style={{marginTop:0}}>Select Status for {TODAY()}</h3>
                                <div style={{display:'grid', gap:10}}>
                                    <button style={{...S.button, background: '#10b981'}} onClick={() => markStatus("Present")}>Present (Full Day)</button>
                                    <button style={{...S.button, background: '#f59e0b'}} onClick={() => markStatus("Sick Leave")}>Sick Leave</button>
                                    <button style={{...S.button, background: '#ef4444'}} onClick={() => markStatus("Casual Leave")}>Casual Leave</button>
                                    <button style={{...S.button, background: '#6366f1'}} onClick={() => markStatus("Work From Home")}>Work From Home</button>
                                </div>
                            </div>
                        )}
                        {view === "dashboard" && (
                            <div style={S.card}>
                                <h3>Team Dashboard</h3>
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:15}}>
                                    <div style={S.stat}><h4>Total Team</h4><p>{MEMBERS.length}</p></div>
                                    <div style={S.stat}><h4>Present Today</h4><p>Live in Firestore</p></div>
                                </div>
                                <p style={{fontSize:12, marginTop:20, color:'#64748b'}}>Download CSV feature is ready to be added here next.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const S = {
            container: { display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh', background: '#f0f4ff' },
            card: { background: '#fff', padding: '30px', borderRadius: '15px', boxShadow: '0 4px 10px rgba(0,0,0,0.05)', width:'100%', maxWidth:'400px', boxSizing:'border-box' },
            input: { width: '100%', padding: '12px', margin: '8px 0', borderRadius: '8px', border: '1px solid #e2e8f0', boxSizing:'border-box' },
            button: { width: '100%', padding: '12px', marginTop: '10px', border: 'none', borderRadius: '8px', color: '#fff', fontWeight: 'bold', cursor: 'pointer', background: '#6366f1' },
            app: { fontFamily: 'DM Sans, sans-serif', background:'#f8fafc', minHeight:'100vh' },
            header: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '15px 20px', background: '#fff', borderBottom: '1px solid #e2e8f0' },
            nav: { display: 'flex', gap: '15px', alignItems:'center' },
            navBtn: { background:'none', border:'none', cursor:'pointer', color:'#64748b', fontWeight:500 },
            activeNav: { background:'none', border:'none', cursor:'pointer', color:'#6366f1', fontWeight:700 },
            logoutBtn: { background:'#fee2e2', border:'none', color:'#ef4444', padding:'5px 10px', borderRadius: '5px', cursor:'pointer' },
            main: { padding: '30px 20px', maxWidth: '600px', margin: '0 auto' },
            stat: { border:'1px solid #f1f5f9', padding:'15px', borderRadius:'10px', textAlign:'center' }
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
