<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Windows | Real-Time Pulse</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #4f46e5; --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #e2e8f0; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .app-container { max-width: 1100px; margin: 0 auto; padding: 25px; }
        .nav-rail { display: flex; gap: 10px; margin-bottom: 30px; }
        .nav-link { padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; color: #64748b; background: white; border: 1px solid #e2e8f0; }
        .nav-link.active { background: var(--brand); color: white; border-color: var(--brand); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .card { background: var(--surface); border-radius: 20px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .btn { padding: 14px 24px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-primary { background: var(--brand); color: white; }
        .btn-primary:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; }
        .badge-present { background: #dcfce7; color: #166534; }
        .badge-pending { background: #f1f5f9; color: #64748b; }
        .badge-leave { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase Initialization
        const firebaseConfig = {
            apiKey: "AIzaSyAKV7ShVU8o-FS4G08pzIEACeR_YOib51Y",
            authDomain: "woolies-pulse.firebaseapp.com",
            projectId: "woolies-pulse",
            storageBucket: "woolies-pulse.firebasestorage.app",
            messagingSenderId: "754063512378",
            appId: "1:754063512378:web:81d15e6a5d9950d6183603"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState("Dashboard");
            const [team, setTeam] = useState([]);
            const [logs, setLogs] = useState([]);
            const [markedToday, setMarkedToday] = useState(false);

            useEffect(() => {
                // Real-time listener for Team Members
                const unsubTeam = db.collection("team").onSnapshot(s => setTeam(s.docs.map(d => ({id:d.id, ...d.data()}))));
                
                // Real-time listener for Attendance
                const unsubLogs = db.collection("attendance").orderBy("timestamp", "desc").onSnapshot(s => {
                    const data = s.docs.map(d => ({id:d.id, ...d.data()}));
                    setLogs(data);
                    if(user) {
                        const hasEntry = data.some(l => l.email === user.email && l.date === new Date().toLocaleDateString());
                        setMarkedToday(hasEntry);
                    }
                });
                return () => { unsubTeam(); unsubLogs(); };
            }, [user]);

            const submitStatus = async (status, lId = "") => {
                if(markedToday) return;
                await db.collection("attendance").add({
                    email: user.email,
                    status,
                    leaveId: lId,
                    date: new Date().toLocaleDateString(),
                    time: new Date().toLocaleTimeString(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Status synchronized successfully.");
            };

            const exportData = () => {
                const csv = "Date,Time,Email,Status,LeaveID\n" + logs.map(l => `${l.date},${l.time},${l.email},${l.status},${l.leaveId || '-'}`).join("\n");
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `SST_Pulse_Report.csv`;
                a.click();
            };

            if (!user) return (
                <div style={{display:'flex', height:'100vh', alignItems:'center', justifyContent:'center'}}>
                    <div className="card" style={{width:'360px', textAlign:'center'}}>
                        <h2 style={{color:'var(--brand)', marginBottom:'5px'}}>SST Windows Pulse</h2>
                        <p style={{fontSize:'14px', color:'#64748b', marginBottom:'25px'}}>Real-time Support Dashboard</p>
                        <form onSubmit={(e) => { e.preventDefault(); setUser({email: e.target.email.value.toLowerCase()}); }}>
                            <input name="email" className="btn" style={{border:'1px solid #e2e8f0', marginBottom:'15px', width:'90%'}} placeholder="Corporate Email" required />
                            <button className="btn btn-primary">Login</button>
                        </form>
                    </div>
                </div>
            );

            const today = new Date().toLocaleDateString();
            const activeCount = logs.filter(l => l.date === today && l.status === "Full Day Operational").length;
            const awayCount = logs.filter(l => l.date === today && l.status.includes("Leave")).length;

            return (
                <div>
                    <header className="glass-header">
                        <span style={{fontWeight:800, fontSize:'20px', letterSpacing:'-0.5px'}}>SST WINDOWS <span style={{color: 'var(--brand)'}}>PULSE</span></span>
                        <div style={{display:'flex', alignItems:'center', gap:'20px'}}>
                            <span style={{fontSize:'13px', fontWeight:600}}>{user.email}</span>
                            <button onClick={()=>setUser(null)} className="badge badge-pending" style={{border:'none', cursor:'pointer'}}>Logout</button>
                        </div>
                    </header>

                    <div className="app-container">
                        <div className="nav-rail">
                            {["Dashboard", "Mark Today", "Audit Log", "Export"].map(t => (
                                <div key={t} className={`nav-link ${view === t ? 'active' : ''}`} onClick={()=>setView(t)}>{t}</div>
                            ))}
                        </div>

                        {view === "Dashboard" && (
                            <div>
                                <div className="stat-grid">
                                    <div className="card"><h3>{team.length || 28}</h3><p>Total Team</p></div>
                                    <div className="card" style={{borderColor: 'var(--success)'}}><h3 style={{color:'var(--success)'}}>{activeCount}</h3><p>Active Today</p></div>
                                    <div className="card" style={{borderColor: 'var(--danger)'}}><h3 style={{color:'var(--danger)'}}>{awayCount}</h3><p>On Leave</p></div>
                                </div>
                                <div className="card" style={{padding:'0'}}>
                                    <table>
                                        <thead><tr><th>Team Member</th><th>Status</th><th>Last Sync</th></tr></thead>
                                        <tbody>
                                            {team.map(m => {
                                                const s = logs.find(l => l.email === m.email && l.date === today);
                                                return (
                                                    <tr key={m.id}>
                                                        <td>{m.name || m.email}</td>
                                                        <td><span className={`badge ${s ? (s.status.includes('Leave') ? 'badge-leave' : 'badge-present') : 'badge-pending'}`}>{s ? s.status : 'Pending'}</span></td>
                                                        <td style={{fontSize:'12px', color:'#94a3b8'}}>{s ? s.time : '--:--'}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {view === "Mark Today" && (
                            <div className="card" style={{maxWidth:'450px', margin:'0 auto', textAlign:'center'}}>
                                <h3>Attendance Gateway</h3>
                                <p style={{color:'#64748b', fontSize:'14px', marginBottom:'25px'}}>{markedToday ? "✅ Your status is live for today." : "Select your operational availability."}</p>
                                <div style={{display:'grid', gap:'15px'}}>
                                    <button className="btn btn-primary" disabled={markedToday} onClick={()=>submitStatus("Full Day Operational")}>Full Day Operational</button>
                                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'15px'}}>
                                        <button className="btn" style={{background:'#eef2ff', color:'var(--brand)'}} disabled={markedToday} onClick={()=>submitStatus("First Half")}>First Half</button>
                                        <button className="btn" style={{background:'#eef2ff', color:'var(--brand)'}} disabled={markedToday} onClick={()=>submitStatus("Second Half")}>Second Half</button>
                                    </div>
                                    <button className="btn" style={{background:'#fee2e2', color:'var(--danger)'}} disabled={markedToday} onClick={()=>{
                                        const type = prompt("Enter Leave Type (Sick, Casual, Earned):");
                                        const id = prompt("Leave ID (Optional):");
                                        if(type) submitStatus(`${type} Leave`, id);
                                    }}>Mark Leave</button>
                                </div>
                            </div>
                        )}

                        {view === "Audit Log" && (
                            <div className="card" style={{padding:0}}>
                                <table>
                                    <thead><tr><th>Time</th><th>User</th><th>Action</th><th>Reference</th></tr></thead>
                                    <tbody>
                                        {logs.map(l => (
                                            <tr key={l.id}>
                                                <td>{l.date} <small>{l.time}</small></td>
                                                <td>{l.email}</td>
                                                <td><b>{l.status}</b></td>
                                                <td>{l.leaveId || '-'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {view === "Export" && (
                            <div className="card" style={{textAlign:'center'}}>
                                <h3>Data Export</h3>
                                <p>Generate the CSV audit report for team records.</p>
                                <button className="btn btn-primary" style={{width:'auto', marginTop:'20px'}} onClick={exportData}>Download CSV</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
