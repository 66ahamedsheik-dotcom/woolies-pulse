<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLMS TeamPulse</title>
    <!-- React and Tailwind for styling -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURATION ---
        const ADMIN_EMAILS = ["sheikahamed@woolworths.com", "vigneshsaravanan@woolworths.com", "lakshmanan@woolworths.com"];
        const DEFAULT_PASS = "pass";
        const MEMBERS = [
            "Sheikahamed", "Vignesh Saravanan", "Lakshmanan", "Dineshk", "Barathcmk", 
            "Bimalm", "Gopinathg", "Harpushapsingh", "Libinshaj", "Lingeswar", 
            "Nandhinim", "Rengaswamyk", "Ramyas", "Soniyal", "Sarvananr", 
            "Sridhar", "Senthils", "Shruthiv", "Tamilselvans", "Vanishrig", 
            "Vigneshjm", "Vasanthl", "Geethapriya", "Gokul", "Arjun Sharma", 
            "Priya Patel", "Rahul Verma", "Sneha Iyer"
        ];

        // --- HELPERS ---
        const TODAY = () => new Date().toISOString().split("T")[0];

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [view, setView] = useState("dashboard"); // Default view
            const [auth, setAuth] = useState({ email: "", pass: "" });

            // Login Logic
            const handleLogin = () => {
                const email = auth.email.toLowerCase();
                if (auth.pass === DEFAULT_PASS) {
                    const user = { email, name: email.split('@')[0], isAdmin: ADMIN_EMAILS.includes(email) };
                    setCurrentUser(user);
                } else {
                    alert("Invalid Password");
                }
            };

            // Export logic (Direct CSV Download)
            const handleExport = () => {
                const rows = [["Name", "Status", "Date"]];
                // In a real scenario, this pulls from Firebase records
                const csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `PLMS_Report_${TODAY()}.csv`);
                document.body.appendChild(link);
                link.click();
            };

            if (!currentUser) {
                return (
                    <div style={S.loader}>
                        <div style={S.card}>
                            <h2 style={S.logoTitle}>TeamPulse Login</h2>
                            <input style={S.input} placeholder="Email" onChange={e => setAuth({...auth, email: e.target.value})} />
                            <input style={S.input} type="password" placeholder="Password" onChange={e => setAuth({...auth, pass: e.target.value})} />
                            <button style={S.bigBtn} onClick={handleLogin}>Sign In</button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={S.app}>
                    <header style={S.header}>
                        <div style={S.headerInner}>
                            <div style={S.logoTitle}>📋 TeamPulse Dashboard</div>
                            <button onClick={() => setCurrentUser(null)} style={S.removeBtn}>Logout</button>
                        </div>
                        <nav style={S.nav}>
                            <button style={view === "dashboard" ? S.navBtnActive : S.navBtn} onClick={() => setView("dashboard")}>📊 Dashboard</button>
                            <button style={view === "attendance" ? S.navBtnActive : S.navBtn} onClick={() => setView("attendance")}>✅ Mark Today</button>
                            <button style={view === "calendar" ? S.navBtnActive : S.navBtn} onClick={() => setView("calendar")}>📅 Calendar</button>
                            {currentUser.isAdmin && (
                                <button style={view === "export" ? S.navBtnActive : S.navBtn} onClick={handleExport}>📥 Export CSV</button>
                            )}
                        </nav>
                    </header>

                    <main style={S.main}>
                        {view === "dashboard" && (
                            <div>
                                <div style={S.statsGrid}>
                                    <div style={S.statCard}><h3>👥 Total Team</h3><p>{MEMBERS.length}</p></div>
                                    <div style={S.statCard}><h3>✅ Present Today</h3><p>--</p></div>
                                </div>
                                <p style={{textAlign:'center', marginTop:20}}>Welcome, {currentUser.name}! Use the tabs above to manage the team.</p>
                            </div>
                        )}

                        {view === "attendance" && (
                            <div style={S.card}>
                                <h3>Select Your Status for {TODAY()}</h3>
                                <div style={{display:'grid', gap:10, marginTop:15}}>
                                    <button style={{...S.bigBtn, background:'#10b981'}}>Present (Full Day)</button>
                                    <button style={{...S.bigBtn, background:'#f59e0b'}}>Sick Leave</button>
                                    <button style={{...S.bigBtn, background:'#ef4444'}}>Casual Leave</button>
                                    <button style={{...S.bigBtn, background:'#6366f1'}}>Work From Home</button>
                                </div>
                            </div>
                        )}

                        {view === "calendar" && (
                            <div style={S.card}>
                                <h3>Team Attendance Calendar</h3>
                                <p style={{fontSize:12, color:'#64748b'}}>Coming Soon: Visual heat-map of team leave.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const S = {
            app: { minHeight: "100vh", background: "#f0f4ff", fontFamily: "'DM Sans', sans-serif" },
            loader: { display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" },
            card: { background: "#fff", borderRadius: 20, padding: 30, boxShadow: "0 4px 20px rgba(0,0,0,0.05)", textAlign: 'center' },
            logoTitle: { fontWeight: 800, fontSize: 20, color: "#1e293b" },
            input: { width: "100%", padding: "12px", borderRadius: 10, border: "1px solid #e2e8f0", marginTop: 10, boxSizing:'border-box' },
            bigBtn: { width: "100%", padding: "12px", borderRadius: 10, background: "#6366f1", color: "#fff", border: "none", fontWeight: 700, cursor: "pointer", marginTop: 10 },
            header: { background: "#fff", borderBottom: "1px solid #e2e8f0" },
            headerInner: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "15px 20px" },
            nav: { display: "flex", gap: 10, padding: "0 20px 10px 20px", overflowX: "auto" },
            navBtn: { background: "none", border: "none", padding: "10px", color: "#94a3b8", cursor: "pointer", whiteSpace: "nowrap" },
            navBtnActive: { color: "#6366f1", fontWeight: 700, borderBottom: "2px solid #6366f1" },
            removeBtn: { background: "#fee2e2", color: "#ef4444", border: "none", padding: "5px 10px", borderRadius: 8 },
            main: { padding: 20, maxWidth: 600, margin: "0 auto" },
            statsGrid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 15 },
            statCard: { background: "#fff", padding: 20, borderRadius: 15, textAlign: 'center', border: '1px solid #f1f5f9' }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
