<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SST Windows – Attendance Dashboard | PLMS Support Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- React via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #0a0c10;
      --surface: #10141c;
      --surface2: #171c27;
      --surface3: #1e2535;
      --border: #252d3d;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --accent-glow: rgba(59,130,246,0.18);
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --purple: #a855f7;
      --orange: #f97316;
      --text: #e8edf5;
      --text2: #8b96a8;
      --text3: #4a5568;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root { min-height: 100vh; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
    @keyframes slideIn { from { opacity:0; transform:translateX(-16px); } to { opacity:1; transform:none; } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes glow { 0%,100%{box-shadow:0 0 16px var(--accent-glow);} 50%{box-shadow:0 0 32px rgba(59,130,246,0.35);} }

    .fade-in { animation: fadeIn 0.35s ease both; }
    .slide-in { animation: slideIn 0.3s ease both; }

    /* ── Loading ── */
    .loader-wrap {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; flex-direction:column; gap:20px;
    }
    .spinner {
      width:40px; height:40px; border:3px solid var(--border);
      border-top-color:var(--accent); border-radius:50%;
      animation: spin 0.8s linear infinite;
    }

    /* ── Auth Screen ── */
    .auth-wrap {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,246,0.08) 0%, transparent 70%), var(--bg);
      padding:16px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      animation: fadeIn 0.4s ease;
    }
    .auth-logo {
      display:flex; align-items:center; gap:12px; margin-bottom:32px;
    }
    .auth-logo-icon {
      width:44px; height:44px; background: linear-gradient(135deg,#3b82f6,#1d4ed8);
      border-radius:10px; display:flex; align-items:center; justify-content:center;
      font-size:22px; box-shadow: 0 4px 16px rgba(59,130,246,0.4);
    }
    .auth-logo-text { font-family:var(--font-head); font-size:18px; font-weight:700; }
    .auth-logo-sub { font-size:11px; color:var(--text2); letter-spacing:0.5px; }
    .auth-title { font-family:var(--font-head); font-size:26px; font-weight:800; margin-bottom:6px; }
    .auth-sub { color:var(--text2); margin-bottom:28px; font-size:13px; }
    .form-group { margin-bottom:18px; }
    .form-label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:7px; letter-spacing:0.4px; text-transform:uppercase; }
    .form-input {
      width:100%; background:var(--surface2); border:1.5px solid var(--border);
      color:var(--text); border-radius:var(--radius-sm); padding:11px 14px;
      font-family:var(--font-body); font-size:14px; outline:none; transition:border 0.2s;
    }
    .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    .form-input::placeholder { color:var(--text3); }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      border:none; cursor:pointer; font-family:var(--font-body); font-weight:600;
      border-radius:var(--radius-sm); transition:all 0.2s; text-decoration:none;
    }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg,#3b82f6,#2563eb);
      color:#fff; padding:12px 24px; font-size:14px; width:100%;
      box-shadow:0 4px 16px rgba(59,130,246,0.3);
    }
    .btn-primary:hover:not(:disabled) { background:linear-gradient(135deg,#60a5fa,#3b82f6); transform:translateY(-1px); box-shadow:0 6px 20px rgba(59,130,246,0.4); }
    .btn-secondary { background:var(--surface2); color:var(--text); padding:9px 18px; font-size:13px; border:1.5px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background:var(--surface3); border-color:var(--accent); }
    .btn-danger { background:rgba(239,68,68,0.15); color:var(--red); padding:7px 14px; font-size:12px; border:1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover:not(:disabled) { background:rgba(239,68,68,0.25); }
    .btn-sm { padding:7px 14px; font-size:12px; }
    .btn-ghost { background:transparent; color:var(--text2); padding:8px 14px; font-size:13px; border:1px solid transparent; }
    .btn-ghost:hover { background:var(--surface2); color:var(--text); }
    .error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:16px; }
    .success-msg { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:#86efac; padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:16px; }

    /* ── App Shell ── */
    .app-shell { display:flex; min-height:100vh; }
    .sidebar {
      width:240px; min-height:100vh; background:var(--surface);
      border-right:1px solid var(--border); display:flex; flex-direction:column;
      position:fixed; top:0; left:0; z-index:100;
      transition:transform 0.3s ease;
    }
    .sidebar-logo {
      padding:20px 20px 16px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px;
    }
    .sidebar-logo-icon {
      width:36px; height:36px; background:linear-gradient(135deg,#3b82f6,#1d4ed8);
      border-radius:8px; display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0;
    }
    .sidebar-logo-name { font-family:var(--font-head); font-size:15px; font-weight:800; line-height:1.2; }
    .sidebar-logo-sub { font-size:10px; color:var(--text2); letter-spacing:0.3px; }
    .sidebar-user { padding:14px 20px; border-bottom:1px solid var(--border); }
    .sidebar-user-name { font-weight:600; font-size:13px; }
    .sidebar-user-role { font-size:11px; color:var(--text2); margin-top:2px; }
    .sidebar-user-badge {
      display:inline-block; background:rgba(59,130,246,0.15); color:var(--accent2);
      font-size:10px; font-weight:700; padding:2px 8px; border-radius:99px;
      border:1px solid rgba(59,130,246,0.25); margin-top:5px; letter-spacing:0.3px;
    }
    .sidebar-nav { flex:1; padding:12px 10px; overflow-y:auto; }
    .nav-section-label { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:1px; text-transform:uppercase; padding:8px 10px 4px; }
    .nav-item {
      display:flex; align-items:center; gap:10px; padding:10px 10px;
      border-radius:var(--radius-sm); cursor:pointer; font-size:13px; font-weight:500;
      color:var(--text2); transition:all 0.18s; margin-bottom:2px;
    }
    .nav-item:hover { background:var(--surface2); color:var(--text); }
    .nav-item.active { background:var(--accent-glow); color:var(--accent2); border:1px solid rgba(59,130,246,0.2); }
    .nav-item .nav-icon { font-size:16px; width:20px; text-align:center; }
    .sidebar-footer { padding:14px 20px; border-top:1px solid var(--border); }
    .main-content { margin-left:240px; flex:1; min-height:100vh; }
    .topbar {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:14px 28px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:50;
    }
    .topbar-title { font-family:var(--font-head); font-size:18px; font-weight:700; }
    .topbar-right { display:flex; align-items:center; gap:12px; }
    .page-content { padding:28px; max-width:1400px; }

    /* ── Cards ── */
    .card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:22px; box-shadow:var(--shadow);
    }
    .card-title { font-family:var(--font-head); font-size:15px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .grid { display:grid; gap:20px; }
    .grid-2 { grid-template-columns: repeat(2,1fr); }
    .grid-3 { grid-template-columns: repeat(3,1fr); }
    .grid-4 { grid-template-columns: repeat(4,1fr); }
    .grid-auto { grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); }

    /* ── Stat Cards ── */
    .stat-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:20px 22px;
      position:relative; overflow:hidden; transition:transform 0.2s;
    }
    .stat-card:hover { transform:translateY(-2px); }
    .stat-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
    }
    .stat-card.blue::before { background:linear-gradient(90deg,#3b82f6,#60a5fa); }
    .stat-card.green::before { background:linear-gradient(90deg,#22c55e,#4ade80); }
    .stat-card.red::before { background:linear-gradient(90deg,#ef4444,#f87171); }
    .stat-card.yellow::before { background:linear-gradient(90deg,#f59e0b,#fcd34d); }
    .stat-card.purple::before { background:linear-gradient(90deg,#a855f7,#c084fc); }
    .stat-label { font-size:11px; font-weight:600; color:var(--text2); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:8px; }
    .stat-value { font-family:var(--font-head); font-size:32px; font-weight:800; line-height:1; }
    .stat-sub { font-size:12px; color:var(--text2); margin-top:6px; }
    .stat-icon { position:absolute; top:18px; right:18px; font-size:24px; opacity:0.3; }

    /* ── Attendance Buttons ── */
    .att-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .att-btn {
      padding:18px 14px; border-radius:var(--radius); border:2px solid var(--border);
      background:var(--surface2); cursor:pointer; text-align:center;
      transition:all 0.2s; font-family:var(--font-body);
    }
    .att-btn:hover { border-color:var(--accent); transform:translateY(-1px); }
    .att-btn.selected { border-color:var(--accent); background:var(--accent-glow); box-shadow:0 0 0 1px var(--accent); }
    .att-btn.green-sel.selected { border-color:var(--green); background:rgba(34,197,94,0.12); box-shadow:0 0 0 1px var(--green); }
    .att-btn.yellow-sel.selected { border-color:var(--yellow); background:rgba(245,158,11,0.12); box-shadow:0 0 0 1px var(--yellow); }
    .att-btn.red-sel.selected { border-color:var(--red); background:rgba(239,68,68,0.12); box-shadow:0 0 0 1px var(--red); }
    .att-btn-icon { font-size:24px; margin-bottom:6px; }
    .att-btn-label { font-size:13px; font-weight:600; color:var(--text); }
    .att-btn-sub { font-size:11px; color:var(--text2); margin-top:3px; }

    /* ── Leave Panel ── */
    .leave-panel {
      background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius);
      padding:18px; margin-top:4px; animation:fadeIn 0.25s ease;
    }
    .leave-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .leave-type-btn {
      padding:10px 12px; border-radius:var(--radius-sm); border:1.5px solid var(--border);
      background:var(--surface3); cursor:pointer; font-family:var(--font-body);
      font-size:12px; font-weight:600; color:var(--text2); text-align:center; transition:all 0.18s;
    }
    .leave-type-btn:hover { border-color:var(--accent); color:var(--text); }
    .leave-type-btn.selected { border-color:var(--accent); background:var(--accent-glow); color:var(--accent2); }

    /* ── Calendar ── */
    .calendar-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-day-label { text-align:center; font-size:11px; font-weight:700; color:var(--text3); padding:4px; letter-spacing:0.5px; text-transform:uppercase; }
    .cal-day {
      aspect-ratio:1; display:flex; align-items:center; justify-content:center;
      border-radius:8px; font-size:12px; font-weight:500; cursor:pointer;
      transition:all 0.15s; position:relative; flex-direction:column; gap:2px;
    }
    .cal-day:hover { background:var(--surface3); }
    .cal-day.today { background:var(--accent-glow); border:1.5px solid var(--accent); color:var(--accent2); font-weight:700; }
    .cal-day.present { background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.3); }
    .cal-day.absent { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.25); }
    .cal-day.half { background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.25); }
    .cal-day.other-month { opacity:0.3; }
    .cal-dot { width:4px; height:4px; border-radius:50%; }
    .cal-dot.green { background:var(--green); }
    .cal-dot.red { background:var(--red); }
    .cal-dot.yellow { background:var(--yellow); }

    /* ── Table ── */
    .table-wrap { overflow-x:auto; border-radius:var(--radius-sm); border:1px solid var(--border); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead th { background:var(--surface2); padding:11px 14px; text-align:left; font-size:11px; font-weight:700; color:var(--text2); letter-spacing:0.5px; text-transform:uppercase; border-bottom:1px solid var(--border); white-space:nowrap; }
    tbody td { padding:11px 14px; border-bottom:1px solid rgba(37,45,61,0.6); color:var(--text); }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:rgba(255,255,255,0.02); }
    .badge {
      display:inline-flex; align-items:center; padding:3px 10px; border-radius:99px;
      font-size:11px; font-weight:700; letter-spacing:0.3px;
    }
    .badge.present { background:rgba(34,197,94,0.12); color:#4ade80; border:1px solid rgba(34,197,94,0.25); }
    .badge.absent { background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.25); }
    .badge.half { background:rgba(245,158,11,0.12); color:#fcd34d; border:1px solid rgba(245,158,11,0.25); }
    .badge.sick { background:rgba(168,85,247,0.12); color:#c084fc; border:1px solid rgba(168,85,247,0.25); }
    .badge.casual { background:rgba(59,130,246,0.12); color:#93c5fd; border:1px solid rgba(59,130,246,0.25); }
    .badge.earned { background:rgba(249,115,22,0.12); color:#fb923c; border:1px solid rgba(249,115,22,0.25); }
    .badge.comp { background:rgba(20,184,166,0.12); color:#2dd4bf; border:1px solid rgba(20,184,166,0.25); }

    /* ── Toast ── */
    .toast-wrap { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:10px; pointer-events:none; }
    .toast {
      background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius);
      padding:13px 18px; font-size:13px; box-shadow:0 8px 32px rgba(0,0,0,0.4);
      animation:fadeIn 0.3s ease; display:flex; align-items:center; gap:10px;
      max-width:320px; pointer-events:all;
    }
    .toast.success { border-color:rgba(34,197,94,0.4); }
    .toast.error { border-color:rgba(239,68,68,0.4); }

    /* ── Modal ── */
    .modal-backdrop {
      position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200;
      display:flex; align-items:center; justify-content:center; padding:16px;
      animation:fadeIn 0.2s ease;
    }
    .modal {
      background:var(--surface); border:1px solid var(--border); border-radius:16px;
      padding:28px; width:100%; max-width:460px;
      box-shadow:0 24px 80px rgba(0,0,0,0.5);
      animation:fadeIn 0.25s ease;
    }
    .modal-title { font-family:var(--font-head); font-size:18px; font-weight:700; margin-bottom:6px; }
    .modal-sub { color:var(--text2); font-size:13px; margin-bottom:22px; }

    /* ── Members ── */
    .member-row {
      display:flex; align-items:center; gap:12px; padding:12px 14px;
      border:1px solid var(--border); border-radius:var(--radius-sm);
      margin-bottom:8px; background:var(--surface2); transition:all 0.18s;
    }
    .member-row:hover { border-color:var(--accent); }
    .avatar {
      width:38px; height:38px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-head); font-size:15px; font-weight:700; flex-shrink:0;
    }
    .member-info { flex:1; min-width:0; }
    .member-name { font-weight:600; font-size:13px; }
    .member-email { font-size:11px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ── Tabs ── */
    .tabs { display:flex; gap:4px; background:var(--surface2); padding:5px; border-radius:var(--radius-sm); margin-bottom:20px; }
    .tab {
      flex:1; padding:8px 14px; border-radius:6px; font-size:13px; font-weight:600;
      cursor:pointer; text-align:center; color:var(--text2); transition:all 0.18s;
    }
    .tab.active { background:var(--surface); color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,0.2); }

    /* ── Export Buttons ── */
    .export-row { display:flex; gap:10px; flex-wrap:wrap; }

    /* ── Live indicator ── */
    .live-dot {
      width:8px; height:8px; background:var(--green); border-radius:50%;
      animation: pulse 2s infinite;
      display:inline-block; margin-right:6px;
    }

    /* ── Mobile ── */
    .hamburger { display:none; cursor:pointer; flex-direction:column; gap:5px; padding:6px; }
    .hamburger span { display:block; width:22px; height:2px; background:var(--text2); border-radius:2px; transition:all 0.2s; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; }

    @media (max-width:900px) {
      .main-content { margin-left:0; }
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); }
      .sidebar-overlay.show { display:block; }
      .hamburger { display:flex; }
      .topbar { padding:12px 16px; }
      .page-content { padding:16px; }
      .grid-4 { grid-template-columns:repeat(2,1fr); }
      .grid-3 { grid-template-columns:1fr 1fr; }
      .grid-2 { grid-template-columns:1fr; }
    }
    @media (max-width:480px) {
      .grid-4 { grid-template-columns:1fr 1fr; }
      .att-grid { grid-template-columns:1fr 1fr; }
      .auth-card { padding:28px 20px; }
    }

    /* ── Section gap ── */
    .section-gap { margin-bottom:24px; }
    .flex-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .spacer { flex:1; }
    hr.divider { border:none; border-top:1px solid var(--border); margin:18px 0; }
    .text-muted { color:var(--text2); }
    .text-sm { font-size:12px; }
    .fw-700 { font-weight:700; }
    .mt-8 { margin-top:8px; }
    .mt-12 { margin-top:12px; }
    .mt-16 { margin-top:16px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────────────
// FIREBASE CONFIGURATION — update with your actual config
// ─────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAKV7ShVU8o-FS4G08pzIEACeR_YOiB51Y",

// TOAST SYSTEM
// ─────────────────────────────────────────────────────
function Toast({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <span>{t.type === 'success' ? '✅' : '❌'}</span>
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='success') => {
    const id = Date.now();
    setToasts(p => [...p, {id, msg, type}]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);
  return { toasts, add };
}

function AuthScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handleLogin = async (e) => {
    e.preventDefault();
    setErr(''); setLoading(true);
    try {
      const cred = await auth.signInWithEmailAndPassword(email.trim(), pass);
      const uid = cred.user.uid;
      const snap = await db.collection('users').doc(uid).get();
      if (!snap.exists) {
        await auth.signOut();
        setErr('Account not found in team roster. Contact admin.');
        return;
      }
      const userData = snap.data();
      await db.collection('users').doc(uid).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
      onLogin(cred.user, userData);
    } catch(ex) {
      const msgs = { 'auth/user-not-found':'No account with this email.', 'auth/wrong-password':'Incorrect password.', 'auth/invalid-email':'Invalid email format.', 'auth/too-many-requests':'Too many attempts. Try later.' };
      setErr(msgs[ex.code] || ex.message);
    } finally { setLoading(false); }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">🪟</div>
          <div>
            <div className="auth-logo-name">SST Windows</div>
            <div className="auth-logo-sub">PLMS SUPPORT TEAM</div>
          </div>
        </div>
        <div className="auth-title">Welcome back</div>
        <div className="auth-sub">Sign in with your corporate credentials</div>
        {err && <div className="error-msg">⚠️ {err}</div>}
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label className="form-label">Corporate Email</label>
            <input className="form-input" type="email" placeholder="you@company.com" value={email} onChange={e=>setEmail(e.target.value)} required />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="Enter password" value={pass} onChange={e=>setPass(e.target.value)} required />
          </div>
          <button className="btn btn-primary" type="submit" disabled={loading}>
            {loading ? <><div style={{width:16,height:16,border:'2px solid rgba(255,255,255,0.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}></div> Signing in…</> : '→ Sign In'}
          </button>
        </form>
        <div style={{marginTop:20,textAlign:'center',color:'var(--text2)',fontSize:12}}>
          🔒 Secured by Firebase Authentication
        </div>
      </div>
    </div>
  );
}

function ChangePasswordScreen({ user, onDone, toast }) {
  const [newPass, setNewPass] = useState('');
  const [confirm, setConfirm] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault(); setErr('');
    if (newPass.length < 8) { setErr('Password must be at least 8 characters.'); return; }
    if (newPass !== confirm) { setErr('Passwords do not match.'); return; }
    setLoading(true);
    try {
      await user.updatePassword(newPass);
      await db.collection('users').doc(user.uid).update({ isFirstLogin: false });
      toast('Password updated successfully! 🎉');
      onDone();
    } catch(ex) { setErr(ex.message); } finally { setLoading(false); }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">🔐</div>
          <div>
            <div className="auth-logo-name">Set New Password</div>
            <div className="auth-logo-sub">ONE-TIME SETUP REQUIRED</div>
          </div>
        </div>
        <div className="auth-title">Secure your account</div>
        <div className="auth-sub">This is your first login. Please create a permanent password to continue.</div>
        {err && <div className="error-msg">⚠️ {err}</div>}
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label className="form-label">New Password</label>
            <input className="form-input" type="password" placeholder="Min. 8 characters" value={newPass} onChange={e=>setNewPass(e.target.value)} required />
          </div>
          <div className="form-group">
            <label className="form-label">Confirm Password</label>
            <input className="form-input" type="password" placeholder="Repeat new password" value={confirm} onChange={e=>setConfirm(e.target.value)} required />
          </div>
          <button className="btn btn-primary" type="submit" disabled={loading}>
            {loading ? 'Updating…' : '→ Set Password & Continue'}
          </button>
        </form>
      </div>
    </div>
  );
}

  const half = todayRecs.filter(r => r.status === 'first_half' || r.status === 'second_half').length;
  const absent = todayRecs.filter(r => r.status === 'absent').length;
  const noMark = totalMembers - todayRecs.length;

// ATTENDANCE PAGE
// ─────────────────────────────────────────────────────
function AttendancePage({ user, userData, toast }) {
  const today = todayStr();
  const [status, setStatus] = useState('');
  const [leaveType, setLeaveType] = useState('');
  const [leaveId, setLeaveId] = useState('');
  const [saving, setSaving] = useState(false);
  const [existing, setExisting] = useState(null);
  const [loading, setLoading] = useState(true);
  const [history, setHistory] = useState([]);

  useEffect(() => {
    const recId = `${user.uid}_${today}`;
    db.collection('attendance').doc(recId).get().then(snap => {
      if (snap.exists) { const d = snap.data(); setExisting(d); setStatus(d.status); setLeaveType(d.leaveType||''); setLeaveId(d.leaveId||''); }
      setLoading(false);
    });
    db.collection('attendance').where('userId','==',user.uid).orderBy('date','desc').limit(15).get().then(snap => {
      setHistory(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
  }, [user.uid]);

  const handleSave = async () => {
    if (!status) { toast('Please select an attendance option.','error'); return; }
    if (status === 'absent' && !leaveType) { toast('Please select a leave type.','error'); return; }
    setSaving(true);
    const recId = `${user.uid}_${today}`;
    const data = {
      userId: user.uid, userName: userData.name||user.email, userEmail: user.email,
      date: today, status, leaveType: status==='absent'?leaveType:'', leaveId: status==='absent'?leaveId:'',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    if (!existing) data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    try {
      await db.collection('attendance').doc(recId).set(data, {merge:true});
      await db.collection('auditLog').add({ ...data, action: existing?'UPDATE':'CREATE', actor: userData.name||user.email });
      setExisting(data);
      toast(existing ? 'Attendance updated ✅' : 'Attendance marked ✅');
      setHistory(h => [data, ...h.filter(r=>r.date!==today)]);
    } catch(ex) { toast(ex.message,'error'); } finally { setSaving(false); }
  };

  if (loading) return <div style={{textAlign:'center',padding:40,color:'var(--text2)'}}>Loading…</div>;

  return (
    <div className="fade-in">
      <div className="grid grid-2">
        <div className="card">
          <div className="card-title">📋 Mark Attendance — {new Date().toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</div>
          {existing && <div className="success-msg" style={{marginBottom:16}}>✅ You've already marked for today. You can update below.</div>}
          <div className="att-grid">
            {STATUS_OPTIONS.map(opt => (
              <div key={opt.id} className={`att-btn ${opt.cls} ${status===opt.id?'selected':''}`} onClick={()=>{setStatus(opt.id);if(opt.id!=='absent'){setLeaveType('');setLeaveId('');}}}>
                <div className="att-btn-icon">{opt.icon}</div>
                <div className="att-btn-label">{opt.label}</div>
                <div className="att-btn-sub">{opt.sub}</div>
              </div>
            ))}
          </div>

          {status === 'absent' && (
            <div className="leave-panel">
              <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>🏖️ Select Leave Type <span style={{color:'var(--red)',marginLeft:4}}>*</span></div>
              <div className="leave-grid">
                {LEAVE_TYPES.map(lt => (
                  <div key={lt} className={`leave-type-btn ${leaveType===lt?'selected':''}`} onClick={()=>setLeaveType(lt)}>{lt}</div>
                ))}
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Leave ID / Reference <span style={{color:'var(--text3)'}}>— Optional</span></label>
                <input className="form-input" placeholder="e.g. HR-2024-045" value={leaveId} onChange={e=>setLeaveId(e.target.value)} />
              </div>
            </div>
          )}

          <button className="btn btn-primary mt-16" onClick={handleSave} disabled={saving}>
            {saving ? 'Saving…' : existing ? '↻ Update Attendance' : '✓ Mark Attendance'}
          </button>
        </div>

        <div className="card">
          <div className="card-title">📆 My Attendance History</div>
          {history.length === 0 ? <div className="text-muted text-sm">No records yet.</div> : (
            <div className="table-wrap">
              <table>
                <thead><tr><th>Date</th><th>Status</th><th>Leave</th></tr></thead>
                <tbody>
                  {history.map((r,i)=>(
                    <tr key={i}>
                      <td style={{fontSize:12}}>{r.date}</td>
                      <td><span className={`badge ${r.status==='present'?'present':r.status==='absent'?'absent':'half'}`}>{r.status==='first_half'?'1st Half':r.status==='second_half'?'2nd Half':r.status}</span></td>
                      <td>{r.leaveType ? <span className={`badge ${(r.leaveType||'').toLowerCase().replace(' ','')}`}>{r.leaveType}</span> : '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// CALENDAR PAGE
// ─────────────────────────────────────────────────────
function CalendarPage({ allRecords, members }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [selected, setSelected] = useState(null);

  const daysInMonth = getDaysInMonth(year, month);
  const firstDay = getFirstDayOfMonth(year, month);
  const monthStr = String(month+1).padStart(2,'0');
  const monthName = new Date(year, month).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const today = todayStr();

  const dayData = {};
  allRecords.forEach(r => {
    if (r.date && r.date.startsWith(`${year}-${monthStr}`)) {
      const day = parseInt(r.date.split('-')[2]);
      if (!dayData[day]) dayData[day] = [];
      dayData[day].push(r);
    }
  });

  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else{setMonth(m=>m-1);} setSelected(null); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else{setMonth(m=>m+1);} setSelected(null); };

  const selectedRecs = selected ? (dayData[selected]||[]) : [];
  const totalMembers = members.length;

  return (
    <div className="fade-in grid grid-2" style={{alignItems:'start'}}>
      <div className="card">
        <div className="calendar-header">
          <button className="btn btn-ghost btn-sm" onClick={prevMonth}>‹ Prev</button>
          <div style={{fontFamily:'var(--font-head)',fontWeight:700,fontSize:16}}>{monthName}</div>
          <button className="btn btn-ghost btn-sm" onClick={nextMonth}>Next ›</button>
        </div>
        <div className="calendar-grid">
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} className="cal-day-label">{d}</div>)}
          {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}></div>)}
          {Array.from({length:daysInMonth}).map((_,i)=>{
            const day = i+1;
            const dateStr = `${year}-${monthStr}-${String(day).padStart(2,'0')}`;
            const recs = dayData[day]||[];
            const pCount = recs.filter(r=>r.status==='present'||r.status==='first_half'||r.status==='second_half').length;
            const aCount = recs.filter(r=>r.status==='absent').length;
            let cls = '';
            if(pCount > 0 && aCount === 0) cls='present';
            else if(aCount > 0 && pCount === 0) cls='absent';
            else if(pCount > 0 && aCount > 0) cls='half';
            const isToday = dateStr === today;
            return (
              <div key={day} className={`cal-day ${isToday?'today':''} ${cls} ${selected===day?'selected':''}`} onClick={()=>setSelected(selected===day?null:day)} style={selected===day?{outline:'2px solid var(--accent)'}:{}}>
                <span style={{fontSize:12}}>{day}</span>
                {recs.length>0 && <div className={`cal-dot ${cls==='present'?'green':cls==='absent'?'red':'yellow'}`}></div>}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:12,marginTop:16,flexWrap:'wrap'}}>
          {[{cls:'present',dot:'green',label:'All Present'},{cls:'half',dot:'yellow',label:'Mixed'},{cls:'absent',dot:'red',label:'On Leave'}].map(l=>(
            <div key={l.cls} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text2)'}}>
              <div className={`cal-dot ${l.dot}`}></div>{l.label}
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        {selected ? (
          <>
            <div className="card-title">
              {`${String(selected).padStart(2,'0')} ${new Date(year,month).toLocaleDateString('en-IN',{month:'long'})} ${year}`}
              <span style={{marginLeft:'auto',fontSize:12,color:'var(--text2)'}}>
                <span className="live-dot"></span>{selectedRecs.length}/{totalMembers} marked
              </span>
            </div>
            {selectedRecs.length === 0 ? <div className="text-muted text-sm">No records for this day.</div> : selectedRecs.map((r,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div className="avatar" style={{background:getAvatarColor(r.userName||''),width:30,height:30,fontSize:11}}>{getInitials(r.userName||'')}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600}}>{r.userName||r.userEmail}</div>
                    {r.leaveType && <div style={{fontSize:11,color:'var(--text2)'}}>{r.leaveType}{r.leaveId?` · ${r.leaveId}`:''}</div>}
                  </div>
                </div>
                <span className={`badge ${r.status==='present'?'present':r.status==='absent'?'absent':'half'}`}>
                  {r.status==='first_half'?'1st Half':r.status==='second_half'?'2nd Half':r.status}
                </span>
              </div>
            ))}
            <hr className="divider"/>
            <div style={{display:'flex',gap:16,fontSize:12,color:'var(--text2)'}}>
              <span>✅ Present: <b style={{color:'var(--green)'}}>{selectedRecs.filter(r=>r.status!=='absent').length}</b></span>
              <span>🔴 Absent: <b style={{color:'var(--red)'}}>{selectedRecs.filter(r=>r.status==='absent').length}</b></span>
              <span>❓ No data: <b style={{color:'var(--text3)'}}>{totalMembers - selectedRecs.length}</b></span>
            </div>
          </>
        ) : (
          <div style={{textAlign:'center',padding:'40px 0',color:'var(--text2)'}}>
            <div style={{fontSize:36,marginBottom:12}}>📅</div>
            <div style={{fontWeight:600}}>Select a day</div>
            <div style={{fontSize:12,marginTop:6}}>Click any date to see attendance details</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────
// TEAM OVERVIEW
// ─────────────────────────────────────────────────────
function TeamPage({ allRecords, members }) {
  const today = todayStr();
  const todayRecs = allRecords.filter(r=>r.date===today);
  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-title">👥 Team Overview — Today</div>
        {members.length === 0 ? <div className="text-muted text-sm">No team members yet.</div> : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Member</th><th>Email</th><th>Role</th><th>Today</th><th>Leave Type</th><th>Last Login</th></tr></thead>
              <tbody>
                {members.map(m=>{
                  const rec = todayRecs.find(r=>r.userId===m.id);
                  return (
                    <tr key={m.id}>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:9}}>
                          <div className="avatar" style={{background:getAvatarColor(m.name||''),width:30,height:30,fontSize:11}}>{getInitials(m.name||'')}</div>
                          <span style={{fontWeight:600}}>{m.name||'—'}</span>
                        </div>
                      </td>
                      <td style={{fontSize:12,color:'var(--text2)'}}>{m.email}</td>
                      <td><span style={{fontSize:11,color:'var(--accent2)'}}>{m.role||'Member'}</span></td>
                      <td>{rec ? <span className={`badge ${rec.status==='present'?'present':rec.status==='absent'?'absent':'half'}`}>{rec.status==='first_half'?'1st Half':rec.status==='second_half'?'2nd Half':rec.status}</span> : <span style={{color:'var(--text3)',fontSize:12}}>Not marked</span>}</td>
                      <td>{rec?.leaveType ? <span className={`badge ${(rec.leaveType||'').toLowerCase().replace(' ','')}`}>{rec.leaveType}</span> : '—'}</td>
                      <td style={{fontSize:12,color:'var(--text2)'}}>{m.lastLogin ? fmtDate(m.lastLogin) : '—'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────
// AUDIT LOG
// ─────────────────────────────────────────────────────
function AuditPage() {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(()=>{
    db.collection('auditLog').orderBy('updatedAt','desc').limit(100).get().then(snap=>{
      setLogs(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);
  return (
    <div className="fade-in card">
      <div className="card-title">🔍 Audit Log <span style={{fontSize:12,color:'var(--text2)',marginLeft:'auto'}}>Last 100 entries</span></div>
      {loading ? <div className="text-muted text-sm">Loading…</div> : logs.length===0 ? <div className="text-muted text-sm">No audit entries yet.</div> : (
        <div className="table-wrap">
          <table>
            <thead><tr><th>Actor</th><th>Action</th><th>Status</th><th>Leave</th><th>Date</th><th>Timestamp</th></tr></thead>
            <tbody>
              {logs.map((l,i)=>(
                <tr key={i}>
                  <td style={{fontWeight:600}}>{l.actor||l.userName||'—'}</td>
                  <td><span style={{fontSize:11,fontWeight:700,color:l.action==='CREATE'?'var(--green)':'var(--yellow)'}}>{l.action||'UPDATE'}</span></td>
                  <td><span className={`badge ${l.status==='present'?'present':l.status==='absent'?'absent':'half'}`}>{l.status==='first_half'?'1st Half':l.status==='second_half'?'2nd Half':l.status}</span></td>
                  <td>{l.leaveType?<span className={`badge ${(l.leaveType||'').toLowerCase().replace(' ','')}`}>{l.leaveType}</span>:'—'}</td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{l.date||'—'}</td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{l.updatedAt?fmtTime(l.updatedAt):'—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────
// MANAGE TEAM
// ─────────────────────────────────────────────────────
function ManagePage({ members, toast, onRefresh }) {
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [role, setRole] = useState('Member');
  const [tempPass, setTempPass] = useState('');
  const [adding, setAdding] = useState(false);
  const [err, setErr] = useState('');
  const [removing, setRemoving] = useState(null);

  const handleAdd = async (e) => {
    e.preventDefault(); setErr('');
    if (!name||!email||!tempPass) { setErr('All fields required.'); return; }
    if (tempPass.length < 6) { setErr('Temp password min 6 chars.'); return; }
    setAdding(true);
    try {
      const cred = await auth.createUserWithEmailAndPassword(email.trim(), tempPass);
      await db.collection('users').doc(cred.user.uid).set({
        name, email: email.trim(), role, isFirstLogin: true,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        lastLogin: null,
      });
      await auth.signOut();
      toast(`${name} added to team ✅`);
      setShowAdd(false); setName(''); setEmail(''); setTempPass(''); setRole('Member');
      onRefresh();
    } catch(ex) { setErr(ex.message); } finally { setAdding(false); }
  };

  const handleRemove = async (m) => {
    if (!window.confirm(`Remove ${m.name} from team? This deletes their Firestore record only.`)) return;
    setRemoving(m.id);
    try {
      await db.collection('users').doc(m.id).delete();
      toast(`${m.name} removed from team.`);
      onRefresh();
    } catch(ex) { toast(ex.message,'error'); } finally { setRemoving(null); }
  };

  return (
    <div className="fade-in">
      <div className="card">
        <div className="flex-row" style={{marginBottom:16}}>
          <div className="card-title" style={{margin:0}}>⚙️ Manage Team Members</div>
          <div className="spacer"/>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(!showAdd)}>
            {showAdd ? '✕ Cancel' : '＋ Add Member'}
          </button>
        </div>

        {showAdd && (
          <form onSubmit={handleAdd} className="leave-panel" style={{marginBottom:20}}>
            <div style={{fontWeight:700,marginBottom:14,fontSize:14}}>➕ New Team Member</div>
            {err && <div className="error-msg">{err}</div>}
            <div className="grid grid-2" style={{gap:12}}>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Full Name</label>
                <input className="form-input" placeholder="John Smith" value={name} onChange={e=>setName(e.target.value)} required/>
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Corporate Email</label>
                <input className="form-input" type="email" placeholder="john@company.com" value={email} onChange={e=>setEmail(e.target.value)} required/>
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Role</label>
                <select className="form-input" value={role} onChange={e=>setRole(e.target.value)}>
                  <option>Member</option><option>Lead</option><option>Manager</option><option>Admin</option>
                </select>
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Temporary Password</label>
                <input className="form-input" type="password" placeholder="Min 6 chars" value={tempPass} onChange={e=>setTempPass(e.target.value)} required/>
              </div>
            </div>
            <button className="btn btn-primary mt-12" type="submit" disabled={adding} style={{width:'auto',padding:'10px 24px'}}>
              {adding?'Creating…':'Create Account'}
            </button>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:8}}>ℹ️ User will be forced to change password on first login.</div>
          </form>
        )}

        <div>
          {members.length === 0 ? <div className="text-muted text-sm">No team members yet. Add one above.</div> :
            members.map(m=>(
              <div key={m.id} className="member-row">
                <div className="avatar" style={{background:getAvatarColor(m.name||'')}}>
                  {getInitials(m.name||'')}
                </div>
                <div className="member-info">
                  <div className="member-name">{m.name||'—'}</div>
                  <div className="member-email">{m.email}</div>
                </div>
                <span style={{fontSize:11,color:'var(--accent2)',fontWeight:600}}>{m.role||'Member'}</span>
                {m.isFirstLogin && <span style={{fontSize:10,background:'rgba(245,158,11,0.15)',color:'#fcd34d',padding:'2px 8px',borderRadius:99,border:'1px solid rgba(245,158,11,0.3)'}}>FIRST LOGIN</span>}
                <button className="btn btn-danger btn-sm" onClick={()=>handleRemove(m)} disabled={removing===m.id}>
                  {removing===m.id?'…':'✕'}
                </button>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────
// EXPORT PAGE
// ─────────────────────────────────────────────────────
function ExportPage({ allRecords, members, toast }) {
  const [loading, setLoading] = useState('');

  const buildCSV = (records) => {
    const header = ['Date','Member Name','Email','Status','Leave Type','Leave ID','Updated At'];
    const rows = records.map(r => [
      r.date||'', r.userName||'', r.userEmail||'', r.status||'', r.leaveType||'', r.leaveId||'',
      r.updatedAt ? (r.updatedAt.toDate ? r.updatedAt.toDate().toISOString() : r.updatedAt) : ''
    ]);
    return [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  };

  const download = (csv, filename) => {
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  };

  const exportDaily = async () => {
    setLoading('daily');
    const today = todayStr();
    const filtered = allRecords.filter(r => r.date === today);
    download(buildCSV(filtered), `attendance_daily_${today}.csv`);
    toast('Daily report downloaded ✅');
    setLoading('');
  };

  const exportWeekly = async () => {
    setLoading('weekly');
    const now = new Date();
    const day = now.getDay();
    const monday = new Date(now); monday.setDate(now.getDate() - (day===0?6:day-1));
    monday.setHours(0,0,0,0);
    const filtered = allRecords.filter(r => {
      const d = new Date(r.date); return d >= monday;
    });
    download(buildCSV(filtered), `attendance_weekly_${dateKey(monday)}.csv`);
    toast('Weekly report downloaded ✅');
    setLoading('');
  };

  const exportMonthly = async () => {
    setLoading('monthly');
    const now = new Date();
    const prefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const filtered = allRecords.filter(r => r.date && r.date.startsWith(prefix));
    download(buildCSV(filtered), `attendance_monthly_${prefix}.csv`);
    toast('Monthly report downloaded ✅');
    setLoading('');
  };

  const exportFull = async () => {
    setLoading('full');
    download(buildCSV(allRecords), `attendance_full_export_${todayStr()}.csv`);
    toast('Full export downloaded ✅');
    setLoading('');
  };

  const totalToday = allRecords.filter(r=>r.date===todayStr()).length;
  const now = new Date();
  const prefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const totalMonth = allRecords.filter(r=>r.date&&r.date.startsWith(prefix)).length;

  return (
    <div className="fade-in">
      <div className="grid grid-2 section-gap">
        {[
          {icon:'📊',label:'Total Records',value:allRecords.length,sub:'All time'},
          {icon:'📅',label:'Today',value:totalToday,sub:'Marks today'},
          {icon:'📆',label:'This Month',value:totalMonth,sub:'Records this month'},
          {icon:'👥',label:'Team Size',value:members.length,sub:'Active members'},
        ].map((s,i)=>(
          <div key={i} className="stat-card blue fade-in" style={{animationDelay:`${i*0.07}s`}}>
            <div className="stat-icon">{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-title">📤 Export Attendance Reports</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}>
          {[
            {key:'daily',label:'Daily Report',sub:`Today — ${todayStr()}`,icon:'📋',fn:exportDaily},
            {key:'weekly',label:'Weekly Report',sub:'This week (Mon–today)',icon:'📆',fn:exportWeekly},
            {key:'monthly',label:'Monthly Report',sub:`${new Date().toLocaleDateString('en-IN',{month:'long',year:'numeric'})}`,icon:'🗓️',fn:exportMonthly},
            {key:'full',label:'Full Export',sub:'All records all time',icon:'📦',fn:exportFull},
          ].map(btn=>(
            <div key={btn.key} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'18px'}}>
              <div style={{fontSize:28,marginBottom:10}}>{btn.icon}</div>
              <div style={{fontFamily:'var(--font-head)',fontWeight:700,fontSize:15,marginBottom:4}}>{btn.label}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:14}}>{btn.sub}</div>
              <button className="btn btn-secondary btn-sm" style={{width:'100%'}} onClick={btn.fn} disabled={loading===btn.key}>
                {loading===btn.key ? '⬇️ Preparing…' : '⬇️ Download CSV'}
              </button>
            </div>
          ))}
        </div>
        <div style={{marginTop:20,fontSize:12,color:'var(--text2)',background:'var(--surface2)',padding:'12px 14px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)'}}>
          ℹ️ <strong>CSV Export</strong> includes: Date, Member Name, Email, Status, Leave Type, Leave ID, and Timestamp. Compatible with Excel, Google Sheets, and all BI tools.
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────
function App() {
  const [authState, setAuthState] = useState('loading'); // loading | auth | first-login | app
  const [fireUser, setFireUser] = useState(null);
  const [userData, setUserData] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [members, setMembers] = useState([]);
  const [allRecords, setAllRecords] = useState([]);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const { toasts, add: addToast } = useToast();

  // Auth listener
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (u) => {
      if (u) {
        const snap = await db.collection('users').doc(u.uid).get();
        if (snap.exists) {
          const data = snap.data();
          setFireUser(u); setUserData(data);
          setAuthState(data.isFirstLogin ? 'first-login' : 'app');
        } else {
          await auth.signOut(); setAuthState('auth');
        }
      } else {
        setFireUser(null); setUserData(null); setAuthState('auth');
      }
    });
    return unsub;
  }, []);

  // Load members
  const loadMembers = useCallback(() => {
    db.collection('users').get().then(snap => {
      setMembers(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
  }, []);

  // Load all attendance records (real-time)
  useEffect(() => {
    if (authState !== 'app') return;
    loadMembers();
    const unsub = db.collection('attendance').orderBy('date','desc').onSnapshot(snap => {
      setAllRecords(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return unsub;
  }, [authState, loadMembers]);

  const handleLogout = () => { auth.signOut(); };

  const pageTitles = { dashboard:'Dashboard', attendance:'My Attendance', calendar:'Calendar View', team:'Team Overview', audit:'Audit Log', manage:'Manage Team', export:'Export Reports' };

  if (authState === 'loading') return (
    <div className="loader-wrap">
      <div className="spinner"></div>
      <div style={{color:'var(--text2)',fontSize:13}}>Loading SST Windows…</div>
    </div>
  );
  if (authState === 'auth') return <AuthScreen onLogin={(u,d)=>{setFireUser(u);setUserData(d);setAuthState(d.isFirstLogin?'first-login':'app');}} />;
  if (authState === 'first-login') return <ChangePasswordScreen user={fireUser} onDone={()=>setAuthState('app')} toast={addToast} />;

  const isAdmin = userData?.role === 'Admin' || userData?.role === 'Manager';

  return (
    <div className="app-shell">
      {/* Sidebar overlay */}
      <div className={`sidebar-overlay ${sidebarOpen?'show':''}`} onClick={()=>setSidebarOpen(false)}/>

      {/* Sidebar */}
      <aside className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="sidebar-logo">
          <div className="sidebar-logo-icon">🪟</div>
          <div>
            <div className="sidebar-logo-name">SST Windows</div>
            <div className="sidebar-logo-sub">PLMS SUPPORT</div>
          </div>
        </div>
        <div className="sidebar-user">
          <div className="sidebar-user-name">{userData?.name || fireUser?.email}</div>
          <div className="sidebar-user-role">{fireUser?.email}</div>
          <div className="sidebar-user-badge">{userData?.role || 'Member'}</div>
        </div>
        <nav className="sidebar-nav">
          {['main','manage'].map(section => {
            const items = NAV.filter(n=>n.section===section && (section==='main'||isAdmin));
            if (!items.length) return null;
            return (
              <div key={section}>
                <div className="nav-section-label">{section==='main'?'Main':'Management'}</div>
                {items.map(n=>(
                  <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>{setPage(n.id);setSidebarOpen(false);}}>
                    <span className="nav-icon">{n.icon}</span>{n.label}
                  </div>
                ))}
              </div>
            );
          })}
        </nav>
        <div className="sidebar-footer">
          <button className="btn btn-ghost" style={{width:'100%',justifyContent:'flex-start'}} onClick={handleLogout}>🚪 Sign Out</button>
        </div>
      </aside>

      {/* Main */}
      <main className="main-content">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}>
              <span/><span/><span/>
            </div>
            <div className="topbar-title">{pageTitles[page]||''}</div>
          </div>
          <div className="topbar-right">
            <span style={{fontSize:12,color:'var(--text2)'}}>
              <span className="live-dot"></span>Live
            </span>
            <div className="avatar" style={{background:getAvatarColor(userData?.name||''),width:32,height:32,fontSize:12}}>
              {getInitials(userData?.name||'')}
            </div>
          </div>
        </div>

        <div className="page-content">
          {page==='dashboard' && <DashboardPage allRecords={allRecords} members={members}/>}
          {page==='attendance' && <AttendancePage user={fireUser} userData={userData} toast={addToast}/>}
          {page==='calendar' && <CalendarPage allRecords={allRecords} members={members}/>}
          {page==='team' && <TeamPage allRecords={allRecords} members={members}/>}
          {page==='audit' && <AuditPage/>}
          {page==='manage' && <ManagePage members={members} toast={addToast} onRefresh={loadMembers}/>}
          {page==='export' && <ExportPage allRecords={allRecords} members={members} toast={addToast}/>}
        </div>
      </main>

      <Toast toasts={toasts}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
