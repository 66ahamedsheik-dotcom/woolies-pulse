<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SST Windows – Attendance Dashboard | PLMS Support Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Syne+Mono&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #04060a;
      --bg2: #070c12;
      --surface: #0b1018;
      --surface2: #0f1520;
      --surface3: #141d2a;
      --surface4: #1a2535;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.09);
      --border3: rgba(255,255,255,0.13);
      --accent: #00d4ff;
      --accent2: #0099cc;
      --accent3: rgba(0,212,255,0.1);
      --accent-glow: rgba(0,212,255,0.25);
      --accent-glow2: rgba(0,212,255,0.08);
      --green: #00ff88;
      --green2: #00cc6a;
      --green-dim: rgba(0,255,136,0.1);
      --red: #ff3366;
      --red2: #ff6688;
      --red-dim: rgba(255,51,102,0.1);
      --yellow: #ffaa00;
      --yellow2: #ffc44d;
      --yellow-dim: rgba(255,170,0,0.1);
      --purple: #9d5cff;
      --purple2: #b37aff;
      --orange: #ff6b35;
      --teal: #00ffcc;
      --pink: #ff3399;
      --morning: #ffaa00;
      --extended: #00d4ff;
      --general: #00ff88;
      --night: #9d5cff;
      --text: #f0f4ff;
      --text2: #6b7fa0;
      --text3: #2d3d55;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 7px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'Syne Mono', 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── ATMOSPHERIC BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 0%, rgba(0,212,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 100%, rgba(157,92,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,255,136,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    #root { min-height: 100vh; position: relative; z-index: 1; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideLeft { from { opacity:0; transform:translateX(-16px); } to { opacity:1; transform:none; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(24px) scale(0.96); } to { opacity:1; transform:none; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes checkPop { 0%{transform:scale(0);} 60%{transform:scale(1.3);} 100%{transform:scale(1);} }
    @keyframes glowPulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
    @keyframes scanline { 0%{transform:translateY(-100%);} 100%{transform:translateY(100vh);} }
    @keyframes numberCount { from{opacity:0;transform:scale(0.8) translateY(4px);} to{opacity:1;transform:none;} }
    @keyframes borderGlow { 0%,100%{box-shadow:0 0 0 0 transparent;} 50%{box-shadow:0 0 20px 2px rgba(0,212,255,0.15);} }
    @keyframes shiftPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.02);} }
    @keyframes floatBg { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-8px) rotate(1deg);} }
    @keyframes progressFill { from{width:0;} to{width:var(--pct);} }
    @keyframes dotBlink { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.3;transform:scale(0.7);} }

    .fade-up { animation: fadeUp 0.45s cubic-bezier(0.16,1,0.3,1) both; }
    .fade-in { animation: fadeIn 0.3s ease both; }

    /* ── LOADER ── */
    .loader-wrap {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; flex-direction:column; gap:24px;
    }
    .loader-logo {
      font-family: var(--font-head);
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, #00d4ff, #9d5cff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }
    .loader-ring {
      width: 48px; height: 48px;
      border: 2px solid rgba(0,212,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 20px rgba(0,212,255,0.2);
    }

    /* ── AUTH ── */
    .auth-wrap {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:20px; position:relative; overflow:hidden;
    }
    .auth-bg-orb {
      position:absolute; border-radius:50%; filter:blur(60px); pointer-events:none;
    }
    .auth-card {
      background: rgba(11,16,24,0.9);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%; max-width: 440px;
      backdrop-filter: blur(40px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,212,255,0.05), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
      position: relative; z-index:1;
    }
    .auth-card::before {
      content:'';position:absolute;inset:0;border-radius:24px;
      background:linear-gradient(135deg,rgba(0,212,255,0.04) 0%,transparent 60%);
      pointer-events:none;
    }
    .auth-logomark {
      width:52px;height:52px;
      background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(157,92,255,0.2));
      border:1px solid rgba(0,212,255,0.3);
      border-radius:14px;display:flex;align-items:center;justify-content:center;
      font-size:26px;margin-bottom:28px;
      box-shadow:0 8px 24px rgba(0,212,255,0.2),inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .auth-headline {
      font-family:var(--font-head);font-size:32px;font-weight:800;
      letter-spacing:-1px;line-height:1.1;margin-bottom:8px;
      background:linear-gradient(135deg,#ffffff 40%,rgba(255,255,255,0.6));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .auth-sub { color:var(--text2);font-size:14px;margin-bottom:32px;line-height:1.5; }
    .form-label {
      display:block;font-size:11px;font-weight:700;color:var(--text2);
      margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;
    }
    .form-input {
      width:100%;background:rgba(255,255,255,0.03);
      border:1px solid var(--border2);color:var(--text);
      border-radius:var(--radius-sm);padding:13px 16px;
      font-family:var(--font-body);font-size:14px;outline:none;
      transition:all 0.2s;
    }
    .form-input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(0,212,255,0.1),0 0 0 1px var(--accent);
      background:rgba(0,212,255,0.03);
    }
    .form-input::placeholder { color:var(--text3); }
    .form-group { margin-bottom:20px; }

    /* ── BUTTONS ── */
    .btn {
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      border:none;cursor:pointer;font-family:var(--font-body);font-weight:600;
      border-radius:var(--radius-sm);transition:all 0.2s;text-decoration:none;
      letter-spacing:0.2px;
    }
    .btn:disabled { opacity:0.4;cursor:not-allowed; }
    .btn-primary {
      background:linear-gradient(135deg,rgba(0,212,255,0.9) 0%,rgba(0,140,200,0.95) 100%);
      color:#000;padding:14px 24px;font-size:14px;font-weight:700;width:100%;
      box-shadow:0 4px 24px rgba(0,212,255,0.3),inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .btn-primary:hover:not(:disabled) {
      transform:translateY(-2px);
      box-shadow:0 8px 32px rgba(0,212,255,0.45),0 0 0 1px rgba(0,212,255,0.4);
    }
    .btn-secondary {
      background:var(--surface2);color:var(--text);
      padding:9px 18px;font-size:13px;border:1px solid var(--border2);
    }
    .btn-secondary:hover:not(:disabled) { background:var(--surface3);border-color:var(--border3); }
    .btn-danger {
      background:rgba(255,51,102,0.08);color:var(--red2);
      padding:7px 14px;font-size:12px;border:1px solid rgba(255,51,102,0.2);
    }
    .btn-danger:hover:not(:disabled) { background:rgba(255,51,102,0.16); }
    .btn-sm { padding:7px 14px;font-size:12px; }
    .btn-ghost {
      background:transparent;color:var(--text2);
      padding:8px 14px;font-size:13px;border:1px solid transparent;
    }
    .btn-ghost:hover { background:var(--surface2);color:var(--text);border-color:var(--border2); }

    .error-msg {
      background:rgba(255,51,102,0.08);border:1px solid rgba(255,51,102,0.2);
      color:#ff8899;padding:12px 15px;border-radius:var(--radius-sm);
      font-size:13px;margin-bottom:18px;
    }
    .success-msg {
      background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);
      color:#66ffaa;padding:12px 15px;border-radius:var(--radius-sm);
      font-size:13px;margin-bottom:18px;
    }

    /* ── APP SHELL ── */
    .app-shell { display:flex;min-height:100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width:260px;min-height:100vh;
      background:rgba(7,12,18,0.95);
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      position:fixed;top:0;left:0;z-index:100;
      transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
      backdrop-filter:blur(40px);
    }
    .sidebar-header {
      padding:24px 20px 18px;
      border-bottom:1px solid var(--border);
    }
    .sidebar-brand {
      display:flex;align-items:center;gap:12px;margin-bottom:0;
    }
    .sidebar-icon {
      width:38px;height:38px;
      background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(157,92,255,0.2));
      border:1px solid rgba(0,212,255,0.25);
      border-radius:10px;display:flex;align-items:center;justify-content:center;
      font-size:19px;flex-shrink:0;
      box-shadow:0 4px 16px rgba(0,212,255,0.15);
    }
    .sidebar-name {
      font-family:var(--font-head);font-size:16px;font-weight:800;
      letter-spacing:-0.5px;
      background:linear-gradient(135deg,#ffffff,rgba(255,255,255,0.7));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .sidebar-tagline { font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px; }
    .sidebar-user {
      padding:14px 16px;border-bottom:1px solid var(--border);
    }
    .sidebar-user-card {
      background:rgba(255,255,255,0.03);border:1px solid var(--border);
      border-radius:var(--radius-sm);padding:13px 14px;
      position:relative;overflow:hidden;
    }
    .sidebar-user-card::before {
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(0,212,255,0.3),transparent);
    }
    .sidebar-uname { font-weight:700;font-size:13px;letter-spacing:-0.2px;color:var(--text); }
    .sidebar-uemail { font-size:11px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .sidebar-badge {
      display:inline-block;margin-top:7px;
      background:linear-gradient(135deg,rgba(0,212,255,0.12),rgba(157,92,255,0.12));
      border:1px solid rgba(0,212,255,0.2);
      color:var(--accent);font-size:10px;font-weight:700;
      padding:3px 10px;border-radius:99px;letter-spacing:0.5px;
    }
    .sidebar-nav { flex:1;padding:14px 10px;overflow-y:auto; }
    .nav-section {
      font-size:10px;font-weight:700;color:var(--text3);
      letter-spacing:1.5px;text-transform:uppercase;
      padding:10px 10px 6px;
    }
    .nav-item {
      display:flex;align-items:center;gap:11px;padding:10px 12px;
      border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;
      color:var(--text2);transition:all 0.18s;margin-bottom:2px;
      border:1px solid transparent;position:relative;
    }
    .nav-item:hover { background:rgba(255,255,255,0.04);color:var(--text); }
    .nav-item.active {
      background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(0,212,255,0.04));
      color:var(--accent);border-color:rgba(0,212,255,0.15);
    }
    .nav-item.active::before {
      content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
      width:3px;height:60%;background:var(--accent);border-radius:0 2px 2px 0;
    }
    .nav-icon { font-size:15px;width:20px;text-align:center;flex-shrink:0; }
    .sidebar-footer { padding:14px 16px;border-top:1px solid var(--border); }
    .main-content { margin-left:260px;flex:1;min-height:100vh; }

    /* ── TOPBAR ── */
    .topbar {
      background:rgba(7,12,18,0.8);
      border-bottom:1px solid var(--border);
      padding:0 28px;height:60px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:50;
      backdrop-filter:blur(40px);
    }
    .topbar-left { display:flex;align-items:center;gap:14px; }
    .topbar-title {
      font-family:var(--font-head);font-size:17px;font-weight:800;
      letter-spacing:-0.4px;
    }
    .topbar-right { display:flex;align-items:center;gap:16px; }
    .live-indicator {
      display:flex;align-items:center;gap:7px;
      background:rgba(0,255,136,0.07);
      border:1px solid rgba(0,255,136,0.15);
      padding:5px 11px;border-radius:99px;
    }
    .live-dot {
      width:6px;height:6px;background:var(--green);border-radius:50%;
      animation:dotBlink 2.5s infinite;
      box-shadow:0 0 8px var(--green);
    }
    .live-text { font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.5px; }
    .topbar-date { font-size:12px;color:var(--text2);font-family:var(--font-mono); }
    .topbar-avatar {
      width:36px;height:36px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-family:var(--font-head);font-size:13px;font-weight:700;
      border:1.5px solid rgba(0,212,255,0.3);
      box-shadow:0 0 12px rgba(0,212,255,0.15);
    }

    /* ── PAGE ── */
    .page-content { padding:28px;max-width:1440px; }

    /* ── CARDS ── */
    .card {
      background:rgba(11,16,24,0.9);
      border:1px solid var(--border);
      border-radius:var(--radius);padding:22px;
      backdrop-filter:blur(20px);
      position:relative;overflow:hidden;
    }
    .card::before {
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
      pointer-events:none;
    }
    .card-title {
      font-family:var(--font-head);font-size:15px;font-weight:700;
      margin-bottom:20px;display:flex;align-items:center;gap:8px;
      letter-spacing:-0.3px;
    }

    .grid { display:grid;gap:18px; }
    .grid-2 { grid-template-columns:repeat(2,1fr); }
    .grid-3 { grid-template-columns:repeat(3,1fr); }
    .grid-4 { grid-template-columns:repeat(4,1fr); }

    /* ── STAT CARDS ── */
    .stat-card {
      border-radius:var(--radius);padding:22px 24px;
      position:relative;overflow:hidden;
      transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
      cursor:default;
    }
    .stat-card:hover { transform:translateY(-4px); }
    .stat-card-bg {
      position:absolute;inset:0;opacity:1;pointer-events:none;
      transition:opacity 0.3s;
    }
    .stat-card:hover .stat-card-bg { opacity:1.4; }
    .stat-card-border { position:absolute;inset:0;border-radius:var(--radius);pointer-events:none; }

    .stat-card.blue {
      background:linear-gradient(135deg,rgba(0,212,255,0.06) 0%,rgba(0,212,255,0.02) 100%);
      border:1px solid rgba(0,212,255,0.15);
    }
    .stat-card.blue:hover { box-shadow:0 16px 40px rgba(0,212,255,0.12),0 0 0 1px rgba(0,212,255,0.2); }
    .stat-card.green {
      background:linear-gradient(135deg,rgba(0,255,136,0.06) 0%,rgba(0,255,136,0.02) 100%);
      border:1px solid rgba(0,255,136,0.15);
    }
    .stat-card.green:hover { box-shadow:0 16px 40px rgba(0,255,136,0.12),0 0 0 1px rgba(0,255,136,0.2); }
    .stat-card.red {
      background:linear-gradient(135deg,rgba(255,51,102,0.06) 0%,rgba(255,51,102,0.02) 100%);
      border:1px solid rgba(255,51,102,0.15);
    }
    .stat-card.red:hover { box-shadow:0 16px 40px rgba(255,51,102,0.12),0 0 0 1px rgba(255,51,102,0.2); }
    .stat-card.yellow {
      background:linear-gradient(135deg,rgba(255,170,0,0.06) 0%,rgba(255,170,0,0.02) 100%);
      border:1px solid rgba(255,170,0,0.15);
    }
    .stat-card.yellow:hover { box-shadow:0 16px 40px rgba(255,170,0,0.12),0 0 0 1px rgba(255,170,0,0.2); }

    .stat-icon-wrap {
      width:42px;height:42px;border-radius:11px;
      display:flex;align-items:center;justify-content:center;
      font-size:20px;margin-bottom:14px;
    }
    .blue .stat-icon-wrap { background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2); }
    .green .stat-icon-wrap { background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.2); }
    .red .stat-icon-wrap { background:rgba(255,51,102,0.1);border:1px solid rgba(255,51,102,0.2); }
    .yellow .stat-icon-wrap { background:rgba(255,170,0,0.1);border:1px solid rgba(255,170,0,0.2); }

    .stat-label {
      font-size:11px;font-weight:700;text-transform:uppercase;
      letter-spacing:1px;margin-bottom:8px;
    }
    .blue .stat-label { color:var(--accent); }
    .green .stat-label { color:var(--green); }
    .red .stat-label { color:var(--red2); }
    .yellow .stat-label { color:var(--yellow); }

    .stat-value {
      font-family:var(--font-head);font-size:40px;font-weight:800;
      line-height:1;letter-spacing:-2px;color:var(--text);
      animation:numberCount 0.5s ease both;
    }
    .stat-sub { font-size:12px;color:var(--text2);margin-top:8px;line-height:1.4; }

    /* ── SHIFT DISTRIBUTION SECTION ── */
    .shift-dist-section {
      background:rgba(11,16,24,0.9);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:22px;
      position:relative;overflow:hidden;
    }
    .shift-dist-section::before {
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(0,212,255,0.15),transparent);
      pointer-events:none;
    }
    .shift-dist-header {
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:20px;
    }
    .shift-dist-title {

// ── Toast Hook ──
function Toast({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <span style={{fontSize:16}}>{t.type === 'success' ? '✅' : '❌'}</span>
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='success') => {
    const id = Date.now();
    setToasts(p => [...p, {id, msg, type}]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);
  return { toasts, add };
}

function AuthScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handleLogin = async (e) => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      const cred = await auth.signInWithEmailAndPassword(email.trim(), pass);
      const snap = await db.collection('users').doc(cred.user.uid).get();
      if (!snap.exists) { await auth.signOut(); setErr('Account not found in team roster.'); return; }
      const userData = snap.data();
      await db.collection('users').doc(cred.user.uid).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
      onLogin(cred.user, userData);
    } catch(ex) {
      const msgs = { 'auth/user-not-found':'No account with this email.', 'auth/wrong-password':'Incorrect password.', 'auth/invalid-email':'Invalid email.', 'auth/too-many-requests':'Too many attempts. Try later.' };
      setErr(msgs[ex.code] || ex.message);
    } finally { setLoading(false); }
  };

  return (
    <div className="auth-wrap">
      <div style={{position:'absolute',width:500,height:500,top:'-100px',left:'-100px',background:'radial-gradient(circle,rgba(0,212,255,0.07) 0%,transparent 70%)',borderRadius:'50%',pointerEvents:'none'}}/>

        <div className="auth-logomark">🪟</div>
        <div style={{fontSize:11,fontWeight:700,color:'var(--accent)',letterSpacing:'2px',textTransform:'uppercase',marginBottom:10}}>PLMS Support Team</div>
        <div className="auth-headline">SST Windows</div>
        <div className="auth-sub">Sign in with your corporate credentials to access the attendance dashboard.</div>
        {err && <div className="error-msg">⚠️ {err}</div>}
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label className="form-label">Corporate Email</label>
            <input className="form-input" type="email" placeholder="you@company.com" value={email} onChange={e=>setEmail(e.target.value)} required />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="Enter password" value={pass} onChange={e=>setPass(e.target.value)} required />
          </div>
          <button className="btn btn-primary" type="submit" disabled={loading}>
            {loading ? (
              <><div style={{width:15,height:15,border:'2px solid rgba(0,0,0,0.3)',borderTopColor:'#000',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}></div>Signing in…</>

          🔒 Secured by Firebase Authentication
        </div>

    </div>
  );
}

// ── Change Password ──
function ChangePasswordScreen({ user, onDone, toast }) {
  const [newPass, setNewPass] = useState('');
  const [confirm, setConfirm] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault(); setErr('');
    if (newPass.length < 8) { setErr('Min 8 characters required.'); return; }
    if (newPass !== confirm) { setErr('Passwords do not match.'); return; }
    setLoading(true);
    try {
      await user.updatePassword(newPass);
      await db.collection('users').doc(user.uid).update({ isFirstLogin: false });
      toast('Password updated successfully! 🎉');
      onDone();
    } catch(ex) { setErr(ex.message); } finally { setLoading(false); }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logomark">🔐</div>
        <div className="auth-headline">Secure your account</div>
        <div className="auth-sub">First login detected. Create a permanent password to continue.</div>
        {err && <div className="error-msg">⚠️ {err}</div>}
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label className="form-label">New Password</label>
            <input className="form-input" type="password" placeholder="Min. 8 characters" value={newPass} onChange={e=>setNewPass(e.target.value)} required />
          </div>
          <div className="form-group">
            <label className="form-label">Confirm Password</label>
            <input className="form-input" type="password" placeholder="Repeat password" value={confirm} onChange={e=>setConfirm(e.target.value)} required />
          </div>
          <button className="btn btn-primary" type="submit" disabled={loading}>
            {loading ? 'Updating…' : '→ Set Password & Continue'}
          </button>
        </form>
      </div>
    </div>
  );
}

function AttendancePage({ user, userData, toast }) {
  const today = todayStr();
  const [status, setStatus] = useState('');
  const [shift, setShift] = useState('');
  const [leaveType, setLeaveType] = useState('');
  const [leaveId, setLeaveId] = useState('');
  const [saving, setSaving] = useState(false);
  const [existing, setExisting] = useState(null);
  const [loading, setLoading] = useState(true);
  const [history, setHistory] = useState([]);
  const [showShiftModal, setShowShiftModal] = useState(false);

  const storageKey = `compliance_${user.uid}_${today}`;
  const [checked, setChecked] = useState(() => {
    try { return JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch { return {}; }
  });

  const saveChecked = (newChecked) => {
    setChecked(newChecked);
    try { localStorage.setItem(storageKey, JSON.stringify(newChecked)); } catch {}
  };

  const toggleCheck = (id) => {
    const newChecked = { ...checked, [id]: !checked[id] };
    saveChecked(newChecked);
    if (!checked[id]) {
      const item = COMPLIANCE_ITEMS.find(i => i.id === id);
      toast(`✅ ${item?.label} marked done!`);
    }
  };

  useEffect(() => {
    const recId = `${user.uid}_${today}`;
    db.collection('attendance').doc(recId).get().then(snap => {
      if (snap.exists) { const d = snap.data(); setExisting(d); setStatus(d.status); setShift(d.shift||''); setLeaveType(d.leaveType||''); setLeaveId(d.leaveId||''); }
      setLoading(false);
    });
    db.collection('attendance').where('userId','==',user.uid).orderBy('date','desc').limit(20).get().then(snap => {
      setHistory(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
  }, [user.uid]);

  const handleStatusClick = (optId) => {
    if (optId === 'present') {
      setShowShiftModal(true);
    } else {
      setStatus(optId);
      setShift('');
      if (optId !== 'absent') { setLeaveType(''); setLeaveId(''); }
    }
  };

  const handleShiftConfirm = (shiftId) => {
    setStatus('present');
    setShift(shiftId);
    setLeaveType('');
    setLeaveId('');
    setShowShiftModal(false);
    toast(`🌟 Shift: ${SHIFTS.find(s=>s.id===shiftId)?.name}`);
  };

  const handleSave = async () => {
    if (!status) { toast('Please select an attendance option.','error'); return; }
    if (status === 'absent' && !leaveType) { toast('Please select a leave type.','error'); return; }
    setSaving(true);
    const recId = `${user.uid}_${today}`;
    const data = {
      userId: user.uid, userName: userData.name||user.email, userEmail: user.email,
      date: today, status,
      shift: status === 'present' ? shift : '',
      leaveType: status==='absent'?leaveType:'',
      leaveId: status==='absent'?leaveId:'',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    if (!existing) data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    try {
      await db.collection('attendance').doc(recId).set(data, {merge:true});
      await db.collection('auditLog').add({ ...data, action: existing?'UPDATE':'CREATE', actor: userData.name||user.email });
      setExisting(data);
      const shiftInfo = shift ? SHIFTS.find(s=>s.id===shift) : null;
      toast(existing ? 'Attendance updated ✅' : `Attendance marked ✅${shiftInfo?` · ${shiftInfo.name}`:''}`);
      setHistory(h => [data, ...h.filter(r=>r.date!==today)]);
    } catch(ex) { toast(ex.message,'error'); } finally { setSaving(false); }
  };

  const selectedShift = shift ? SHIFTS.find(s=>s.id===shift) : null;

  if (loading) return <div style={{textAlign:'center',padding:40,color:'var(--text2)'}}>Loading…</div>;

  return (
    <div className="fade-up">
      {showShiftModal && (
        <ShiftModal onConfirm={handleShiftConfirm} onClose={() => setShowShiftModal(false)} />
      )}
      <div className="grid grid-2">
        <div>
          {/* Mark Attendance Card */}
          <div className="card section-gap">
            <div className="card-title">
              📋 Mark Attendance
              <span style={{marginLeft:'auto',fontSize:11,color:'var(--text2)',fontWeight:500,fontFamily:'var(--font-mono)'}}>
                {new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})}
              </span>
            </div>
            {existing && (
              <div className="success-msg" style={{marginBottom:16}}>✅ Already marked today. You can update below.</div>
            )}

            <div className="att-grid">
              {STATUS_OPTIONS.map(opt => (
                <div
                  key={opt.id}
                  className={`att-btn ${opt.cls} ${status===opt.id?'selected':''}`}
                  onClick={() => handleStatusClick(opt.id)}
                >
                  <div className="att-btn-icon">{opt.icon}</div>
                  <div className="att-btn-label">{opt.label}</div>
                  <div className="att-btn-sub">{opt.sub}</div>
                  {opt.id === 'present' && status === 'present' && selectedShift && (
                    <div style={{marginTop:7,fontSize:10,fontFamily:'var(--font-mono)',fontWeight:700,color:selectedShift.color}}>
                      {selectedShift.icon} {selectedShift.time}
                    </div>
                  )}
                </div>
              ))}
            </div>

            {status === 'present' && selectedShift && (
              <div style={{background:`rgba(${selectedShift.id==='morning'?'255,170,0':selectedShift.id==='extended'?'0,212,255':selectedShift.id==='general'?'0,255,136':'157,92,255'},0.07)`,border:`1px solid rgba(${selectedShift.id==='morning'?'255,170,0':selectedShift.id==='extended'?'0,212,255':selectedShift.id==='general'?'0,255,136':'157,92,255'},0.2)`,borderRadius:12,padding:'12px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
                <div style={{fontSize:26}}>{selectedShift.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>{selectedShift.name}</div>
                  <div style={{fontSize:12,fontFamily:'var(--font-mono)',color:selectedShift.color,fontWeight:600}}>{selectedShift.time}</div>
                </div>
                <button className="btn btn-ghost btn-sm" onClick={() => setShowShiftModal(true)} style={{fontSize:11}}>Change</button>
              </div>
            )}

            {status === 'present' && !selectedShift && (
              <div style={{background:'rgba(255,170,0,0.07)',border:'1px solid rgba(255,170,0,0.2)',borderRadius:12,padding:'10px 14px',marginBottom:14,fontSize:12,color:'var(--yellow2)'}}>
                ⚠️ No shift selected. Click <strong>Present</strong> to pick your shift.
              </div>
            )}

            {status === 'absent' && (
              <div className="leave-panel">
                <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:'var(--text)'}}>
                  🏖️ Leave Type <span style={{color:'var(--red)',marginLeft:4}}>*</span>
                </div>
                <div className="leave-grid">
                  {LEAVE_TYPES.map(lt => (
                    <div key={lt} className={`leave-type-btn ${leaveType===lt?'selected':''}`} onClick={()=>setLeaveType(lt)}>{lt}</div>
                  ))}
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label className="form-label">Leave ID <span style={{color:'var(--text3)'}}>— Optional</span></label>
                  <input className="form-input" placeholder="e.g. HR-2024-045" value={leaveId} onChange={e=>setLeaveId(e.target.value)} />
                </div>
              </div>
            )}

            <button className="btn btn-primary mt-8" onClick={handleSave} disabled={saving}>
              {saving ? 'Saving…' : existing ? '↻ Update Attendance' : '✓ Mark Attendance'}
            </button>
          </div>

          {/* Simplified Compliance Card */}
          <div className="card">
            <div className="card-title">
              ✅ Compliance Checklist
              <span style={{marginLeft:'auto',fontSize:11,color:'var(--text2)',fontWeight:500}}>
                {COMPLIANCE_ITEMS.filter(i=>checked[i.id]).length}/{COMPLIANCE_ITEMS.length} done
              </span>
            </div>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:16,lineHeight:1.5}}>
              Mark your weekly TCS and CATS submissions as done.
            </div>
            <ComplianceChecklist checked={checked} onToggle={toggleCheck} />
          </div>
        </div>

        {/* History */}
        <div className="card">
          <div className="card-title">📆 My Attendance History</div>
          {history.length === 0 ? <div className="text-muted text-sm">No records yet.</div> : (
            <div className="table-wrap">
              <table>
                <thead>
                  <tr><th>Date</th><th>Status</th><th>Shift</th><th>Leave</th></tr>
                </thead>
                <tbody>
                  {history.map((r,i)=>{
                    const shiftInfo = r.shift ? SHIFTS.find(s=>s.id===r.shift) : null;
                    return (
                      <tr key={i}>
                        <td style={{fontSize:12,color:'var(--text2)',fontFamily:'var(--font-mono)'}}>{r.date}</td>
                        <td><span className={`badge ${r.status==='present'?'present':r.status==='absent'?'absent':'half'}`}>{r.status==='first_half'?'1st Half':r.status==='second_half'?'2nd Half':r.status}</span></td>
                        <td>
                          {shiftInfo ? (
                            <span className={`shift-tag ${shiftInfo.id}`}>{shiftInfo.icon} {shiftInfo.time}</span>
                          ) : '—'}
                        </td>
                        <td>{r.leaveType ? <span className={`badge ${(r.leaveType||'').toLowerCase().replace(' ','')}`}>{r.leaveType}</span> : '—'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Calendar Page ──
function CalendarPage({ allRecords, members }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [selected, setSelected] = useState(null);

  const daysInMonth = getDaysInMonth(year, month);
  const firstDay = getFirstDayOfMonth(year, month);
  const monthStr = String(month+1).padStart(2,'0');
  const monthName = new Date(year, month).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const today = todayStr();

  const dayData = {};
  allRecords.forEach(r => {
    if (r.date && r.date.startsWith(`${year}-${monthStr}`)) {
      const day = parseInt(r.date.split('-')[2]);
      if (!dayData[day]) dayData[day] = [];
      dayData[day].push(r);
    }
  });

  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else{setMonth(m=>m-1);} setSelected(null); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else{setMonth(m=>m+1);} setSelected(null); };

  const selectedRecs = selected ? (dayData[selected]||[]) : [];
  const totalMembers = members.length;

  return (
    <div className="fade-up grid grid-2" style={{alignItems:'start'}}>
      <div className="card">
        <div className="calendar-header">
          <button className="btn btn-ghost btn-sm" onClick={prevMonth}>‹ Prev</button>
          <div style={{fontFamily:'var(--font-head)',fontWeight:800,fontSize:15,letterSpacing:'-0.3px'}}>{monthName}</div>
          <button className="btn btn-ghost btn-sm" onClick={nextMonth}>Next ›</button>
        </div>
        <div className="calendar-grid">
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} className="cal-day-label">{d}</div>)}
          {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}></div>)}
          {Array.from({length:daysInMonth}).map((_,i)=>{
            const day = i+1;
            const dateStr = `${year}-${monthStr}-${String(day).padStart(2,'0')}`;
            const recs = dayData[day]||[];
            const pCount = recs.filter(r=>r.status!=='absent').length;
            const aCount = recs.filter(r=>r.status==='absent').length;
            let cls = '';
            if(pCount>0&&aCount===0) cls='present';
            else if(aCount>0&&pCount===0) cls='absent';
            else if(pCount>0&&aCount>0) cls='half';
            const isToday = dateStr===today;
            return (
              <div key={day} className={`cal-day ${isToday?'today':''} ${cls}`} onClick={()=>setSelected(selected===day?null:day)} style={selected===day?{outline:'2px solid var(--accent)',outlineOffset:'1px'}:{}}>
                <span>{day}</span>
                {recs.length>0 && <div className={`cal-dot ${cls==='present'?'green':cls==='absent'?'red':'yellow'}`}></div>}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:16,marginTop:16,flexWrap:'wrap'}}>
          {[{cls:'present',dot:'green',label:'All Present'},{cls:'half',dot:'yellow',label:'Mixed'},{cls:'absent',dot:'red',label:'On Leave'}].map(l=>(
            <div key={l.cls} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text2)'}}>
              <div className={`cal-dot ${l.dot}`}></div>{l.label}
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        {selected ? (
          <>
            <div className="card-title">
              {`${String(selected).padStart(2,'0')} ${new Date(year,month).toLocaleDateString('en-IN',{month:'long'})} ${year}`}
              <span style={{marginLeft:'auto',fontSize:11,color:'var(--text2)'}}>
                <div className="live-indicator" style={{marginLeft:8,display:'inline-flex'}}>
                  <div className="live-dot"></div>
                  <div className="live-text">{selectedRecs.length}/{totalMembers}</div>
                </div>
              </span>
            </div>
            {selectedRecs.length === 0 ? <div className="text-muted text-sm">No records.</div> : selectedRecs.map((r,i)=>{
              const shiftInfo = r.shift ? SHIFTS.find(s=>s.id===r.shift) : null;
              return (
                <div key={i} style={{padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div className="avatar" style={{background:getAvatarColor(r.userName||'')+'33',color:getAvatarColor(r.userName||''),width:30,height:30,fontSize:11,border:`1px solid ${getAvatarColor(r.userName||'')}44`}}>{getInitials(r.userName||'')}</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:700}}>{r.userName||r.userEmail}</div>
                        {r.leaveType && <div style={{fontSize:11,color:'var(--text2)'}}>{r.leaveType}{r.leaveId?` · ${r.leaveId}`:''}</div>}
                      </div>
                    </div>
                    <span className={`badge ${r.status==='present'?'present':r.status==='absent'?'absent':'half'}`}>
                      {r.status==='first_half'?'1st Half':r.status==='second_half'?'2nd Half':r.status}
                    </span>
                  </div>
                  {shiftInfo && (
                    <div style={{marginLeft:40,marginTop:5}}>
                      <span className={`shift-tag ${shiftInfo.id}`}>{shiftInfo.icon} {shiftInfo.name} · {shiftInfo.time}</span>
                    </div>
                  )}
                </div>
              );
            })}
            <hr className="divider"/>
            <div style={{display:'flex',gap:16,fontSize:12,color:'var(--text2)'}}>
              <span>✅ <b style={{color:'var(--green)'}}>{selectedRecs.filter(r=>r.status!=='absent').length}</b></span>
              <span>🔴 <b style={{color:'var(--red)'}}>{selectedRecs.filter(r=>r.status==='absent').length}</b></span>
              <span>❓ <b style={{color:'var(--text3)'}}>{totalMembers - selectedRecs.length}</b></span>
            </div>
          </>
        ) : (
          <div style={{textAlign:'center',padding:'60px 0',color:'var(--text2)'}}>
            <div style={{fontSize:48,marginBottom:16,filter:'grayscale(0.3)'}}>📅</div>
            <div style={{fontFamily:'var(--font-head)',fontWeight:700,fontSize:16,color:'var(--text)'}}>Select a day</div>
            <div style={{fontSize:12,marginTop:6}}>Click any date to see attendance details</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Manage Team ──
function ManagePage({ members, toast, onRefresh }) {
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [role, setRole] = useState('Member');
  const [tempPass, setTempPass] = useState('');
  const [adding, setAdding] = useState(false);
  const [err, setErr] = useState('');
  const [removing, setRemoving] = useState(null);

  const handleAdd = async (e) => {
    e.preventDefault(); setErr('');
    if (!name||!email||!tempPass) { setErr('All fields required.'); return; }
    if (tempPass.length < 6) { setErr('Temp password min 6 chars.'); return; }
    setAdding(true);
    try {
      const cred = await auth.createUserWithEmailAndPassword(email.trim(), tempPass);
      await db.collection('users').doc(cred.user.uid).set({ name, email:email.trim(), role, isFirstLogin:true, createdAt:firebase.firestore.FieldValue.serverTimestamp(), lastLogin:null });
      await auth.signOut();
      toast(`${name} added to team ✅`);
      setShowAdd(false); setName(''); setEmail(''); setTempPass(''); setRole('Member');
      onRefresh();
    } catch(ex) { setErr(ex.message); } finally { setAdding(false); }
  };

  const handleRemove = async (m) => {
    if (!window.confirm(`Remove ${m.name}?`)) return;
    setRemoving(m.id);
    try {
      await db.collection('users').doc(m.id).delete();
      toast(`${m.name} removed.`);
      onRefresh();
    } catch(ex) { toast(ex.message,'error'); } finally { setRemoving(null); }
  };

  return (
    <div className="fade-up">
      <div className="card">
        <div className="flex-row" style={{marginBottom:20}}>
          <div className="card-title" style={{margin:0}}>⚙️ Manage Team Members</div>
          <div className="spacer"/>
          <button className="btn btn-primary btn-sm" style={{width:'auto'}} onClick={()=>setShowAdd(!showAdd)}>
            {showAdd ? '✕ Cancel' : '＋ Add Member'}
          </button>
        </div>
        {showAdd && (
          <form onSubmit={handleAdd} style={{background:'rgba(255,255,255,0.02)',border:'1px solid var(--border2)',borderRadius:14,padding:20,marginBottom:22}}>
            <div style={{fontWeight:700,marginBottom:14,fontSize:14}}>➕ New Team Member</div>
            {err && <div className="error-msg">{err}</div>}
            <div className="grid grid-2" style={{gap:12}}>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Full Name</label><input className="form-input" placeholder="John Smith" value={name} onChange={e=>setName(e.target.value)} required/></div>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Email</label><input className="form-input" type="email" placeholder="john@co.com" value={email} onChange={e=>setEmail(e.target.value)} required/></div>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Role</label><select className="form-input" value={role} onChange={e=>setRole(e.target.value)}><option>Member</option><option>Lead</option><option>Manager</option><option>Admin</option></select></div>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Temp Password</label><input className="form-input" type="password" placeholder="Min 6 chars" value={tempPass} onChange={e=>setTempPass(e.target.value)} required/></div>
            </div>
            <button className="btn btn-primary mt-12" type="submit" disabled={adding} style={{width:'auto',padding:'10px 24px'}}>{adding?'Creating…':'Create Account'}</button>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:8}}>ℹ️ User must change password on first login.</div>
          </form>
        )}
        <div>
          {members.length === 0 ? <div className="text-muted text-sm">No members yet.</div> : members.map(m=>(
            <div key={m.id} className="member-row">
              <div className="avatar" style={{background:getAvatarColor(m.name||'')+'33',color:getAvatarColor(m.name||''),border:`1.5px solid ${getAvatarColor(m.name||'')}44`}}>{getInitials(m.name||'')}</div>
              <div style={{flex:1,minWidth:0}}>
                <div className="member-name-text">{m.name||'—'}</div>
                <div className="member-email-text">{m.email}</div>
              </div>
              <span style={{fontSize:11,color:'var(--accent)',fontWeight:700}}>{m.role||'Member'}</span>
              {m.isFirstLogin && <span style={{fontSize:10,background:'rgba(255,170,0,0.08)',color:'var(--yellow)',padding:'2px 8px',borderRadius:99,border:'1px solid rgba(255,170,0,0.2)',fontWeight:700}}>FIRST LOGIN</span>}
              <button className="btn btn-danger btn-sm" onClick={()=>handleRemove(m)} disabled={removing===m.id}>{removing===m.id?'…':'✕'}</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Export Page ──
function ExportPage({ allRecords, members, toast }) {
  const [loading, setLoading] = useState('');

  const buildCSV = (records) => {
    const header = ['Date','Member Name','Email','Status','Shift','Shift Time','Leave Type','Leave ID','Updated At'];
    const rows = records.map(r => {
      const shiftInfo = r.shift ? SHIFTS.find(s=>s.id===r.shift) : null;
      return [r.date||'',r.userName||'',r.userEmail||'',r.status||'',shiftInfo?.name||'',shiftInfo?.time||'',r.leaveType||'',r.leaveId||'',r.updatedAt?(r.updatedAt.toDate?r.updatedAt.toDate().toISOString():r.updatedAt):''];
    });
    return [header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  };

  const download = (csv, filename) => {
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  };

  const today = todayStr();
  const now = new Date();
  const prefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const exports = [
    {key:'daily',label:'Daily Report',sub:`Today — ${today}`,icon:'📋',fn:async()=>{download(buildCSV(allRecords.filter(r=>r.date===today)),`attendance_daily_${today}.csv`);toast('Daily downloaded ✅');}},
    {key:'weekly',label:'Weekly Report',sub:'This week',icon:'📆',fn:async()=>{
      const day=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));mon.setHours(0,0,0,0);
      download(buildCSV(allRecords.filter(r=>new Date(r.date)>=mon)),`attendance_weekly_${dateKey(mon)}.csv`);toast('Weekly downloaded ✅');
    }},
    {key:'monthly',label:'Monthly Report',sub:now.toLocaleDateString('en-IN',{month:'long',year:'numeric'}),icon:'🗓️',fn:async()=>{download(buildCSV(allRecords.filter(r=>r.date&&r.date.startsWith(prefix))),`attendance_monthly_${prefix}.csv`);toast('Monthly downloaded ✅');}},
    {key:'full',label:'Full Export',sub:'All records all time',icon:'📦',fn:async()=>{download(buildCSV(allRecords),`attendance_full_${today}.csv`);toast('Full export downloaded ✅');}},
  ];

  return (
    <div className="fade-up">
      <div className="grid grid-4 section-gap">
        {[
          {icon:'📊',label:'Total Records',value:allRecords.length,sub:'All time'},
          {icon:'📅',label:'Today',value:allRecords.filter(r=>r.date===today).length,sub:'Marks today'},
          {icon:'📆',label:'This Month',value:allRecords.filter(r=>r.date&&r.date.startsWith(prefix)).length,sub:'This month'},
          {icon:'👥',label:'Team Size',value:members.length,sub:'Active'},
        ].map((s,i)=>(
          <div key={i} className={`stat-card ${i===0?'blue':i===1?'green':i===2?'yellow':'red'} fade-up`} style={{animationDelay:`${i*0.07}s`}}>
            <div className="stat-icon-wrap">{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-title">📤 Export Reports</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:14}}>
          {exports.map(btn=>(
            <div key={btn.key} style={{background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:14,padding:'20px'}}>
              <div style={{fontSize:30,marginBottom:11}}>{btn.icon}</div>
              <div style={{fontFamily:'var(--font-head)',fontWeight:800,fontSize:15,marginBottom:4,letterSpacing:'-0.2px'}}>{btn.label}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:16}}>{btn.sub}</div>
              <button className="btn btn-secondary btn-sm" style={{width:'100%'}} onClick={async()=>{setLoading(btn.key);await btn.fn();setLoading('');}} disabled={loading===btn.key}>
                {loading===btn.key?'⬇️ Preparing…':'⬇️ Download CSV'}
              </button>
            </div>
          ))}
        </div>
        <div style={{marginTop:18,fontSize:12,color:'var(--text2)',background:'rgba(255,255,255,0.02)',padding:'12px 14px',borderRadius:var(--radius-sm),border:'1px solid var(--border)'}}>
          ℹ️ CSV includes: Date, Name, Email, Status, Shift, Shift Time, Leave Type, Leave ID, Timestamp.
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──
function App() {
  const [authState, setAuthState] = useState('loading');
  const [fireUser, setFireUser] = useState(null);
  const [userData, setUserData] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [members, setMembers] = useState([]);
  const [allRecords, setAllRecords] = useState([]);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const { toasts, add: addToast } = useToast();

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (u) => {
      if (u) {
        const snap = await db.collection('users').doc(u.uid).get();
        if (snap.exists) {
          const data = snap.data();
          setFireUser(u); setUserData(data);
          setAuthState(data.isFirstLogin ? 'first-login' : 'app');
        } else { await auth.signOut(); setAuthState('auth'); }
      } else { setFireUser(null); setUserData(null); setAuthState('auth'); }
    });
    return unsub;
  }, []);

  const loadMembers = useCallback(() => {
    db.collection('users').get().then(snap => setMembers(snap.docs.map(d=>({id:d.id,...d.data()}))));
  }, []);

  useEffect(() => {
    if (authState !== 'app') return;
    loadMembers();
    const unsub = db.collection('attendance').orderBy('date','desc').onSnapshot(snap => {
      setAllRecords(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return unsub;
  }, [authState, loadMembers]);

  const pageTitles = { dashboard:'Dashboard', attendance:'My Attendance', calendar:'Calendar View', team:'Team Overview', audit:'Audit Log', manage:'Manage Team', export:'Export Reports' };

  if (authState === 'loading') return (
    <div className="loader-wrap">
      <div className="loader-ring"></div>
      <div className="loader-logo">SST Windows</div>
      <div style={{color:'var(--text3)',fontSize:12,letterSpacing:'1.5px',textTransform:'uppercase'}}>Loading Dashboard…</div>
    </div>
  );
  if (authState === 'auth') return <AuthScreen onLogin={(u,d)=>{setFireUser(u);setUserData(d);setAuthState(d.isFirstLogin?'first-login':'app');}} />;
  if (authState === 'first-login') return <ChangePasswordScreen user={fireUser} onDone={()=>setAuthState('app')} toast={addToast} />;

  const isAdmin = userData?.role === 'Admin' || userData?.role === 'Manager';

  return (
    <div className="app-shell">
      <div className={`sidebar-overlay ${sidebarOpen?'show':''}`} onClick={()=>setSidebarOpen(false)}/>

      <aside className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="sidebar-header">
          <div className="sidebar-brand">
            <div className="sidebar-icon">🪟</div>
            <div>
              <div className="sidebar-name">SST Windows</div>
              <div className="sidebar-tagline">PLMS Support</div>
            </div>
          </div>
        </div>
        <div className="sidebar-user">
          <div className="sidebar-user-card">
            <div className="sidebar-uname">{userData?.name || fireUser?.email}</div>
            <div className="sidebar-uemail">{fireUser?.email}</div>
            <div className="sidebar-badge">{userData?.role || 'Member'}</div>
          </div>
        </div>
        <nav className="sidebar-nav">
          {['main','manage'].map(section => {
            const items = NAV.filter(n=>n.section===section && (section==='main'||isAdmin));
            if (!items.length) return null;
            return (
              <div key={section}>
                <div className="nav-section">{section==='main'?'Main':'Management'}</div>
                {items.map(n=>(
                  <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>{setPage(n.id);setSidebarOpen(false);}}>
                    <span className="nav-icon">{n.icon}</span>{n.label}
                  </div>
                ))}
              </div>
            );
          })}
        </nav>
        <div className="sidebar-footer">
          <button className="btn btn-ghost" style={{width:'100%',justifyContent:'flex-start'}} onClick={()=>auth.signOut()}>
            🚪 Sign Out
          </button>
        </div>
      </aside>

      <main className="main-content">
        <div className="topbar">
          <div className="topbar-left">
            <div className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}>
              <span/><span/><span/>
            </div>
            <div className="topbar-title">{pageTitles[page]||''}</div>
          </div>
          <div className="topbar-right">
            <div className="live-indicator">
              <div className="live-dot"></div>
              <div className="live-text">LIVE</div>
            </div>
            <div className="topbar-date">{new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</div>
            <div className="topbar-avatar" style={{background:getAvatarColor(userData?.name||'')+'33',color:getAvatarColor(userData?.name||'')}}>
              {getInitials(userData?.name||'')}
            </div>
          </div>
        </div>

        <div className="page-content">
          {page==='dashboard' && <DashboardPage allRecords={allRecords} members={members}/>}
          {page==='attendance' && <AttendancePage user={fireUser} userData={userData} toast={addToast}/>}
          {page==='calendar' && <CalendarPage allRecords={allRecords} members={members}/>}
          {page==='team' && <TeamPage allRecords={allRecords} members={members}/>}
          {page==='audit' && <AuditPage/>}
          {page==='manage' && <ManagePage members={members} toast={addToast} onRefresh={loadMembers}/>}
          {page==='export' && <ExportPage allRecords={allRecords} members={members} toast={addToast}/>}
        </div>
      </main>

      <Toast toasts={toasts}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
